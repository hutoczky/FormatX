          )
          .replace(

            '<script defer src="/scifi-ui/scripts/project-hub.js?v=20260720-project-hub-7"><\/script></body>'
          );
        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        document.documentElement.innerHTML = '<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>FormatX Suite Pro</title></head><body style="margin:0;background:#030817;color:#eaf4ff;font:18px/1.6 system-ui;padding:40px"><h1>FormatX Suite Pro</h1><p>A főoldal betöltése nem sikerült. Frissítsd az oldalt néhány másodperc múlva.</p></body>';
