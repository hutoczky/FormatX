name: Publish final FormatX Android 1.0.4 APK

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/publish-formatx1-apk-104.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout current master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 9.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.5.0"

      - name: Install Android SDK
        shell: bash
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          test -n "$SDK_ROOT"
          SDKMANAGER="$(find "$SDK_ROOT/cmdline-tools" -type f -name sdkmanager | sort -V | tail -n 1)"
          test -x "$SDKMANAGER"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0"

      - name: Apply final formatx1 and WebView cache fix
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import re
          from pathlib import Path

          main = Path('android-app/app/src/main/java/hu/formatx/suite/MainActivity.java')
          text = main.read_text(encoding='utf-8')
          text = re.sub(
              r'private static final String PRIMARY_HOST = "[^"]+";',
              'private static final String PRIMARY_HOST = "formatx1.formatx.workers.dev";',
              text,
              count=1,
          )
          text = re.sub(
              r'private static final String PRIMARY_PATH = "[^"]+";',
              'private static final String PRIMARY_PATH = "/scifi-ui/";',
              text,
              count=1,
          )
          text = text.replace('FormatXAndroid/1.0.3', 'FormatXAndroid/1.0.4')
          text = text.replace('appVersion", "1.0.3"', 'appVersion", "1.0.4"')
          text = text.replace('settings.setCacheMode(WebSettings.LOAD_DEFAULT);',
                              'settings.setCacheMode(WebSettings.LOAD_NO_CACHE);')

          init_marker = '        configureWebView();\n        configureBackNavigation();'
          fixed_init = ('        configureWebView();\n'
                        '        webView.clearCache(true);\n'
                        '        webView.clearHistory();\n'
                        '        android.webkit.WebStorage.getInstance().deleteAllData();\n'
                        '        configureBackNavigation();')
          if 'webView.clearCache(true);' not in text:
              if init_marker not in text:
                  raise SystemExit('WebView inicializálási pont nem található.')
              text = text.replace(init_marker, fixed_init, 1)

          if '.appendQueryParameter("cacheBust", "104")' not in text:
              marker = '.appendQueryParameter("appVersion", "1.0.4")'
              if marker not in text:
                  raise SystemExit('Az appVersion paraméter nem található.')
              text = text.replace(
                  marker,
                  marker + '\n                .appendQueryParameter("cacheBust", "104")',
                  1,
              )

          for required in (
              'PRIMARY_HOST = "formatx1.formatx.workers.dev"',
              'PRIMARY_PATH = "/scifi-ui/"',
              'LOAD_NO_CACHE',
              'webView.clearCache(true)',
              'WebStorage.getInstance().deleteAllData()',
              'cacheBust", "104"',
              'FormatXAndroid/1.0.4',
          ):
              if required not in text:
                  raise SystemExit(f'Hiányzó javítás: {required}')
          main.write_text(text, encoding='utf-8')

          build_file = Path('android-app/app/build.gradle.kts')
          build = build_file.read_text(encoding='utf-8')
          build = build.replace('versionCode = 5', 'versionCode = 6')
          build = build.replace('versionName = "1.0.3"', 'versionName = "1.0.4"')
          if 'versionCode = 6' not in build or 'versionName = "1.0.4"' not in build:
              raise SystemExit('Az Android 1.0.4 verzió nincs beállítva.')
          build_file.write_text(build, encoding='utf-8')
          PY

      - name: Build and validate APK
        shell: bash
        run: |
          set -euo pipefail
          gradle --no-daemon --stacktrace --project-dir android-app :app:assembleDebug :app:lintDebug
          APK="android-app/app/build/outputs/apk/debug/app-debug.apk"
          test -s "$APK"
          unzip -t "$APK" >/dev/null
          test "$(stat -c '%s' "$APK")" -gt 800000

      - name: Publish website APK and update manifest
        shell: bash
        run: |
          set -euo pipefail
          APK="android-app/app/build/outputs/apk/debug/app-debug.apk"
          DEST="docs/scifi-ui/downloads/FormatX-Suite-Pro-Android.apk"
          VERSIONED="docs/scifi-ui/downloads/FormatX-Suite-Pro-Android-1.0.4.apk"
          MANIFEST="docs/scifi-ui/downloads/android-update.json"

          cp "$APK" "$DEST"
          cp "$APK" "$VERSIONED"
          SHA256="$(sha256sum "$DEST" | awk '{print $1}')"
          printf '%s  %s\n' "$SHA256" "$DEST" > docs/scifi-ui/downloads/FormatX-Suite-Pro-Android.apk.sha256

          SHA256="$SHA256" python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest = Path('docs/scifi-ui/downloads/android-update.json')
          data = json.loads(manifest.read_text(encoding='utf-8'))
          data.update({
              'versionCode': 6,
              'versionName': '1.0.4',
              'apkUrl': 'https://hutoczky.github.io/FormatX/scifi-ui/downloads/FormatX-Suite-Pro-Android.apk',
              'sha256': os.environ['SHA256'],
              'mandatory': False,
              'notes': 'A helyes formatx1.formatx.workers.dev/scifi-ui oldal és a teljes Android WebView gyorsítótár törlése.'
          })
          manifest.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          wrong = Path('docs/scifi-ui/android-update.json')
          if wrong.exists():
              wrong.unlink()
          PY

          test "$(python3 -c "import json; print(json.load(open('$MANIFEST'))['sha256'])")" = "$SHA256"
          echo "Final APK SHA256: $SHA256"

      - name: Commit final APK and source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/publish-formatx1-apk-104.yml
          git add android-app/app/src/main/java/hu/formatx/suite/MainActivity.java \
                  android-app/app/build.gradle.kts \
                  docs/scifi-ui/downloads
          git add -A docs/scifi-ui/android-update.json
          git commit -m "Publish final FormatX Android 1.0.4 for formatx1 site"
          git pull --rebase origin master
          git push origin HEAD:master
