name: Publish FormatX Android release

on:
  push:
    branches: [master]
    paths:
      - "docs/scifi-ui/downloads/FormatX-Suite-Pro-Android.apk"
      - "docs/scifi-ui/downloads/android-update.json"
      - ".github/workflows/publish-android-release.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: formatx-android-release
  cancel-in-progress: false

jobs:
  publish:
    name: Verify and publish Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Verify update manifest and APK digest
        id: release
        shell: bash
        run: |
          set -euo pipefail
          APK="docs/scifi-ui/downloads/FormatX-Suite-Pro-Android.apk"
          MANIFEST="docs/scifi-ui/downloads/android-update.json"
          test -s "$APK"
          test -s "$MANIFEST"
          unzip -t "$APK" >/dev/null

          python3 - <<'PY' > /tmp/release.env
          import hashlib
          import json
          from pathlib import Path

          apk = Path('docs/scifi-ui/downloads/FormatX-Suite-Pro-Android.apk')
          manifest = json.loads(Path('docs/scifi-ui/downloads/android-update.json').read_text(encoding='utf-8'))
          digest = hashlib.sha256(apk.read_bytes()).hexdigest()
          expected = str(manifest['sha256']).lower()
          if digest != expected:
              raise SystemExit(f'SHA256 mismatch: manifest={expected} apk={digest}')
          version = str(manifest['versionName']).strip()
          version_code = int(manifest['versionCode'])
          apk_url = str(manifest['apkUrl']).strip()
          if version_code < 1 or not version or apk_url != 'https://www.formatxsuite.com/download/android':
              raise SystemExit('Invalid Android release metadata or non-production APK URL')
          print(f'VERSION={version}')
          print(f'VERSION_CODE={version_code}')
          print(f'SHA256={digest}')
          print(f'APK_URL={apk_url}')
          PY
          cat /tmp/release.env >> "$GITHUB_ENV"
          source /tmp/release.env
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=android-v${VERSION}-beta" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Prepare release files
        run: |
          mkdir -p dist
          cp docs/scifi-ui/downloads/FormatX-Suite-Pro-Android.apk dist/FormatX-Suite-Pro-Android.apk
          printf '%s  %s\n' "$SHA256" "FormatX-Suite-Pro-Android.apk" > dist/FormatX-Suite-Pro-Android.apk.sha256

      - name: Create or update GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
          VERSION_CODE: ${{ env.VERSION_CODE }}
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/release-notes.md <<EOF
          ## FormatX Suite Pro Android ${VERSION}

          Honlapról telepíthető, SHA-256 ellenőrzött Android bétaalkalmazás.

          - teljes FormatX weboldal az alkalmazásban;
          - elsődleges www és tartalék apex saját domain ugyanazon Cloudflare Workeren;
          - natív, egyszerűsített HUF/EUR banki fizetés;
          - indításkori frissítésellenőrzés;
          - automatikus APK-letöltés és SHA-256 ellenőrzés;
          - az Android rendszertelepítője végzi a frissítés jóváhagyását;
          - verziókód: ${VERSION_CODE}.

          Fontos: a későbbi, helyben telepíthető frissítéseket ugyanazzal az Android aláírókulccsal kell aláírni, mint ezt az APK-t.
          EOF

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              dist/FormatX-Suite-Pro-Android.apk \
              dist/FormatX-Suite-Pro-Android.apk.sha256 \
              --clobber
            gh release edit "$TAG" \
              --title "FormatX Suite Pro Android ${VERSION} Beta" \
              --notes-file /tmp/release-notes.md \
              --prerelease
          else
            gh release create "$TAG" \
              dist/FormatX-Suite-Pro-Android.apk \
              dist/FormatX-Suite-Pro-Android.apk.sha256 \
              --target "$GITHUB_SHA" \
              --title "FormatX Suite Pro Android ${VERSION} Beta" \
              --notes-file /tmp/release-notes.md \
              --prerelease
          fi

      - name: Publish permanent download URLs
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          {
            echo "## FormatX Android download"
            echo
            echo "Website: $APK_URL"
            echo
            echo "GitHub: https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/FormatX-Suite-Pro-Android.apk"
            echo
            echo "SHA256: $SHA256"
          } >> "$GITHUB_STEP_SUMMARY"
