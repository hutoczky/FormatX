name: Verify FormatX Android release

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/verify-android-release.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      TAG: android-v1.0.0-beta
      APK: FormatX-Suite-Pro-Android.apk

    steps:
      - name: Wait for Android prerelease and verify assets
        id: verify
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5 6; do
            if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json tagName,isPrerelease,assets,url > /tmp/release.json 2>/dev/null; then
              break
            fi
            echo "Release not ready yet; attempt $attempt"
            sleep 15
          done

          test -s /tmp/release.json
          python3 - <<'PY'
          import json
          data = json.load(open('/tmp/release.json', encoding='utf-8'))
          assert data['tagName'] == 'android-v1.0.0-beta'
          assert data['isPrerelease'] is True
          names = {asset['name'] for asset in data['assets']}
          assert 'FormatX-Suite-Pro-Android.apk' in names
          assert 'FormatX-Suite-Pro-Android.apk.sha256' in names
          print(data['url'])
          PY

          download_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${APK}"
          code="$(curl --location --silent --show-error --output /tmp/FormatX.apk --write-out '%{http_code}' "$download_url")"
          test "$code" = "200"
          test -s /tmp/FormatX.apk
          sha="$(sha256sum /tmp/FormatX.apk | cut -d' ' -f1)"
          echo "download_url=$download_url" >> "$GITHUB_OUTPUT"
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"
          echo "size=$(stat -c '%s' /tmp/FormatX.apk)" >> "$GITHUB_OUTPUT"

      - name: Publish verification result
        env:
          GH_TOKEN: ${{ github.token }}
          DOWNLOAD_URL: ${{ steps.verify.outputs.download_url }}
          SHA256: ${{ steps.verify.outputs.sha256 }}
          SIZE: ${{ steps.verify.outputs.size }}
        run: |
          title="FormatX Android release verified"
          body="$(printf 'A tartós Android prerelease és APK ellenőrzése sikerült.\n\n- Letöltés: %s\n- SHA256: `%s`\n- Méret: `%s` bájt\n- Tag: `android-v1.0.0-beta`' "$DOWNLOAD_URL" "$SHA256" "$SIZE")"
          gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" --body "$body"
