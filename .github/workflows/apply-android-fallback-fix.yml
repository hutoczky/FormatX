name: Apply automatic Android website fallback

on:
  push:
    branches: [agent/fix-android-black-screen]
    paths:
      - ".github/workflows/apply-android-fallback-fix.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-android-black-screen

      - name: Add Worker to GitHub Pages automatic fallback
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('android-app/app/src/main/java/hu/formatx/suite/MainActivity.java')
          text = path.read_text(encoding='utf-8')

          text = text.replace(
              '    private static final String TRUSTED_HOST = "formatxsuite.formatx.workers.dev";\n'
              '    private static final String HOME_PATH = "/scifi-ui/index.html";\n',
              '    private static final String PRIMARY_HOST = "formatxsuite.formatx.workers.dev";\n'
              '    private static final String PRIMARY_PATH = "/";\n'
              '    private static final String FALLBACK_HOST = "hutoczky.github.io";\n'
              '    private static final String FALLBACK_PATH = "/FormatX/scifi-ui/index.html";\n'
          )
          text = text.replace('    private boolean pageVisible;\n', '    private boolean pageVisible;\n    private boolean usingFallback;\n')
          text = text.replace('        homeUri = buildHomeUri();\n', '        homeUri = buildUri(PRIMARY_HOST, PRIMARY_PATH);\n')
          text = text.replace(' FormatXAndroid/1.0.1"', ' FormatXAndroid/1.0.2"')

          text = re.sub(
              r'    private final Runnable loadTimeout = \(\) -> \{.*?\n    \};',
              '''    private final Runnable loadTimeout = () -> {
        if (!pageVisible) {
            handleLoadFailure("A FormatX oldal nem töltődött be időben.");
        }
    };''',
              text,
              count=1,
              flags=re.S,
          )

          text = re.sub(
              r'    private Uri buildHomeUri\(\) \{.*?\n    \}\n\n    private void loadHome\(\) \{.*?\n    \}',
              '''    private Uri buildUri(String host, String path) {
        String language = Locale.getDefault().getLanguage().equalsIgnoreCase("hu") ? "hu" : "en";
        return new Uri.Builder()
                .scheme("https")
                .authority(host)
                .path(path)
                .appendQueryParameter("app", "android")
                .appendQueryParameter("lang", language)
                .appendQueryParameter("appVersion", "1.0.2")
                .build();
    }

    private void loadHome() {
        usingFallback = false;
        homeUri = buildUri(PRIMARY_HOST, PRIMARY_PATH);
        loadCurrentUri();
    }

    private void loadFallback() {
        usingFallback = true;
        homeUri = buildUri(FALLBACK_HOST, FALLBACK_PATH);
        loadCurrentUri();
    }

    private void loadCurrentUri() {
        pageVisible = false;
        showLoading();
        handler.removeCallbacks(loadTimeout);
        webView.stopLoading();
        webView.loadUrl(homeUri.toString());
        scheduleTimeout();
    }''',
              text,
              count=1,
              flags=re.S,
          )

          text = text.replace(
              '        stateMessage.setText("Kapcsolódás a biztonságos FormatX szolgáltatáshoz.");',
              '        stateMessage.setText(usingFallback\n'
              '                ? "A közvetlen kapcsolat nem sikerült, a biztonságos tartalék oldal betöltése folyamatban van."\n'
              '                : "Kapcsolódás a biztonságos FormatX szolgáltatáshoz.");'
          )

          marker = '    private void configureBackNavigation() {'
          fallback_method = '''    private void handleLoadFailure(String reason) {
        handler.removeCallbacks(loadTimeout);
        if (!usingFallback) {
            loadFallback();
            return;
        }
        showError(
                "A FormatX oldal nem érhető el.",
                reason + " Ellenőrizd az internetkapcsolatot, majd próbáld újra."
        );
    }

    private boolean isTrustedHost(String host) {
        return PRIMARY_HOST.equalsIgnoreCase(host) || FALLBACK_HOST.equalsIgnoreCase(host);
    }

'''
          if fallback_method.strip() not in text:
              text = text.replace(marker, fallback_method + marker, 1)

          text = text.replace(
              '        if (!TRUSTED_HOST.equalsIgnoreCase(uri.getHost())) {',
              '        String path = uri.getPath() == null ? "" : uri.getPath();\n'
              '        if (path.endsWith("/download/android")) {\n'
              '            openExternal(Uri.parse("https://" + PRIMARY_HOST + "/download/android"));\n'
              '            return true;\n'
              '        }\n\n'
              '        if (!isTrustedHost(uri.getHost())) {'
          )
          text = text.replace(
              '        String path = uri.getPath() == null ? "" : uri.getPath();\n'
              '        if (path.endsWith("/checkout.html") || path.equals("/checkout.html")) {',
              '        if (path.endsWith("/checkout.html") || path.equals("/checkout.html")) {'
          )

          text = text.replace(
              '                showError("A FormatX oldal nem érhető el.", "Hálózati hiba történt. Próbáld újra, vagy nyisd meg böngészőben.");',
              '                handleLoadFailure("Hálózati hiba történt.");'
          )
          text = text.replace(
              '                showError("A FormatX oldal hibát jelzett.", "HTTP " + response.getStatusCode() + " választ kaptunk. Próbáld újra később.");',
              '                handleLoadFailure("HTTP " + response.getStatusCode() + " választ kaptunk.");'
          )
          text = text.replace(
              '            showError("A biztonságos kapcsolat sikertelen.", "A tanúsítvány ellenőrzése nem sikerült, ezért az alkalmazás megszakította a kapcsolatot.");',
              '            handleLoadFailure("A biztonságos kapcsolat tanúsítvány-ellenőrzése sikertelen volt.");'
          )
          text = text.replace(
              '            showError("A webes megjelenítő leállt.", "Az Android WebView folyamat leállt. Indítsd újra az alkalmazást vagy nyisd meg böngészőben.");',
              '            handleLoadFailure("Az Android WebView megjelenítőfolyamata leállt.");'
          )

          required = [
              'PRIMARY_HOST',
              'FALLBACK_HOST',
              'loadFallback()',
              'isTrustedHost',
              'FormatXAndroid/1.0.2',
              'https://" + PRIMARY_HOST + "/download/android',
          ]
          missing = [item for item in required if item not in text]
          if missing:
              raise SystemExit(f'Missing Android fallback markers: {missing}')

          path.write_text(text, encoding='utf-8')

          gradle_path = Path('android-app/app/build.gradle.kts')
          gradle = gradle_path.read_text(encoding='utf-8')
          gradle = gradle.replace('versionCode = 2', 'versionCode = 3')
          gradle = gradle.replace('versionName = "1.0.1"', 'versionName = "1.0.2"')
          gradle_path.write_text(gradle, encoding='utf-8')

          worker_path = Path('billing-worker/src/live-entry.js')
          worker = worker_path.read_text(encoding='utf-8')
          worker = worker.replace('android-v1.0.1-beta', 'android-v1.0.2-beta')
          worker = worker.replace('FormatX-Suite-Pro-Android-1.0.1.apk', 'FormatX-Suite-Pro-Android-1.0.2.apk')
          worker_path.write_text(worker, encoding='utf-8')
          PY

      - name: Validate fallback patch
        run: |
          grep -F 'FALLBACK_HOST = "hutoczky.github.io"' android-app/app/src/main/java/hu/formatx/suite/MainActivity.java
          grep -F 'versionName = "1.0.2"' android-app/app/build.gradle.kts
          grep -F 'android-v1.0.2-beta' billing-worker/src/live-entry.js
          node --check billing-worker/src/live-entry.js

      - name: Commit patch and remove one-time workflow
        run: |
          rm .github/workflows/apply-android-fallback-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android-app/app/src/main/java/hu/formatx/suite/MainActivity.java android-app/app/build.gradle.kts billing-worker/src/live-entry.js .github/workflows/apply-android-fallback-fix.yml
          git commit -m "Add automatic Android website fallback and bump to 1.0.2"
          git push origin HEAD:agent/fix-android-black-screen
