name: Restart FormatX Worker and Android 1.0.4 repair

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/fix-formatx1-site-and-publish-android-rerun.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: formatx1-android-104-final
  cancel-in-progress: false

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout current master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up Java and Gradle
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.5.0"

      - name: Install Android SDK
        shell: bash
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          test -n "$SDK_ROOT"
          SDKMANAGER="$(find "$SDK_ROOT/cmdline-tools" -type f -name sdkmanager | sort -V | tail -n 1)"
          test -x "$SDKMANAGER"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0"

      - name: Fix stale WebView content and bump Android version
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          main = Path('android-app/app/src/main/java/hu/formatx/suite/MainActivity.java')
          text = main.read_text(encoding='utf-8')
          text = text.replace('FormatXAndroid/1.0.3', 'FormatXAndroid/1.0.4')
          text = text.replace('appVersion", "1.0.3"', 'appVersion", "1.0.4"')
          text = text.replace('settings.setCacheMode(WebSettings.LOAD_DEFAULT);',
                              'settings.setCacheMode(WebSettings.LOAD_NO_CACHE);')

          old = '        configureWebView();\n        configureBackNavigation();'
          new = ('        configureWebView();\n'
                 '        webView.clearCache(true);\n'
                 '        webView.clearHistory();\n'
                 '        android.webkit.WebStorage.getInstance().deleteAllData();\n'
                 '        configureBackNavigation();')
          if 'webView.clearCache(true);' not in text:
              if old not in text:
                  raise SystemExit('Nem található a WebView inicializálási pont.')
              text = text.replace(old, new, 1)

          if '.appendQueryParameter("cacheBust", "104")' not in text:
              marker = '.appendQueryParameter("appVersion", "1.0.4")'
              if marker not in text:
                  raise SystemExit('Nem található az appVersion paraméter.')
              text = text.replace(marker, marker + '\n                .appendQueryParameter("cacheBust", "104")', 1)

          required = [
              'private static final String PRIMARY_HOST = "formatx1.formatx.workers.dev";',
              'private static final String PRIMARY_PATH = "/scifi-ui/";',
              'settings.setCacheMode(WebSettings.LOAD_NO_CACHE);',
              'webView.clearCache(true);',
              'cacheBust", "104"',
              'FormatXAndroid/1.0.4',
          ]
          for item in required:
              if item not in text:
                  raise SystemExit(f'Hiányzó javítás: {item}')
          main.write_text(text, encoding='utf-8')

          gradle = Path('android-app/app/build.gradle.kts')
          build = gradle.read_text(encoding='utf-8')
          build = build.replace('versionCode = 5', 'versionCode = 6')
          build = build.replace('versionName = "1.0.3"', 'versionName = "1.0.4"')
          if 'versionCode = 6' not in build or 'versionName = "1.0.4"' not in build:
              raise SystemExit('Sikertelen Android verzióemelés.')
          gradle.write_text(build, encoding='utf-8')
          PY

      - name: Build and lint Android APK
        shell: bash
        run: |
          set -euo pipefail
          gradle --no-daemon --stacktrace --warning-mode all --project-dir android-app \
            :app:assembleDebug :app:lintDebug

      - name: Publish Android 1.0.4 files
        shell: bash
        run: |
          set -euo pipefail
          APK="android-app/app/build/outputs/apk/debug/app-debug.apk"
          DEST="docs/scifi-ui/downloads/FormatX-Suite-Pro-Android.apk"
          VERSIONED="docs/scifi-ui/downloads/FormatX-Suite-Pro-Android-1.0.4.apk"
          test -s "$APK"
          unzip -t "$APK" >/dev/null
          test "$(stat -c '%s' "$APK")" -gt 800000
          cp "$APK" "$DEST"
          cp "$APK" "$VERSIONED"
          SHA256="$(sha256sum "$DEST" | awk '{print $1}')"
          printf '%s  %s\n' "$SHA256" "$DEST" > docs/scifi-ui/downloads/FormatX-Suite-Pro-Android.apk.sha256

          SHA256="$SHA256" python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest = Path('docs/scifi-ui/downloads/android-update.json')
          data = json.loads(manifest.read_text(encoding='utf-8'))
          data.update({
              'versionCode': 6,
              'versionName': '1.0.4',
              'apkUrl': 'https://hutoczky.github.io/FormatX/scifi-ui/downloads/FormatX-Suite-Pro-Android.apk',
              'sha256': os.environ['SHA256'],
              'mandatory': False,
              'notes': 'A helyes formatx1 /scifi-ui oldal, teljes WebView cache-törlés és friss, cache nélküli oldalbetöltés.'
          })
          manifest.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          worker = Path('billing-worker/src/production-entry.js')
          worker_text = worker.read_text(encoding='utf-8').replace(
              'FormatX-Suite-Pro-Android-1.0.3.apk',
              'FormatX-Suite-Pro-Android-1.0.4.apk'
          )
          worker.write_text(worker_text, encoding='utf-8')
          PY

          test "$(python3 -c "import json; print(json.load(open('docs/scifi-ui/downloads/android-update.json'))['sha256'])")" = "$SHA256"
          echo "APK_SHA256=$SHA256" >> "$GITHUB_ENV"

      - name: Deploy modern site and API to formatx1 Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ffd7d28ea7c6a510549dc9363619c8c5
          workingDirectory: billing-worker
          command: deploy --name formatx1

      - name: Verify modern FormatX page and CSS
        shell: bash
        run: |
          set -euo pipefail
          HTML="$(mktemp)"
          CSS="$(mktemp)"
          URL='https://formatx1.formatx.workers.dev/scifi-ui/?lang=hu&cacheBust=104'
          for attempt in $(seq 1 12); do
            if curl -fsSL --connect-timeout 10 --max-time 30 -H 'Cache-Control: no-cache' "$URL" -o "$HTML" \
                && grep -Fq 'class="reference-commerce"' "$HTML" \
                && grep -Fq 'reference-commerce.css' "$HTML"; then
              break
            fi
            if [ "$attempt" -eq 12 ]; then
              echo 'A formatx1 Worker ellenőrzése sikertelen.' >&2
              sed -n '1,80p' "$HTML" >&2 || true
              exit 1
            fi
            sleep 5
          done
          curl -fsSL --connect-timeout 10 --max-time 30 -H 'Cache-Control: no-cache' \
            'https://formatx1.formatx.workers.dev/scifi-ui/styles/reference-commerce.css?v=20260718-reference-commerce-1' -o "$CSS"
          test "$(stat -c '%s' "$CSS")" -gt 1000
          grep -Fq '.reference-commerce' "$CSS"

      - name: Commit and push final repair
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
          git rm -f .github/workflows/fix-formatx1-site-and-publish-android.yml \
                    .github/workflows/fix-formatx1-site-and-publish-android-rerun.yml
          git add android-app docs/scifi-ui/downloads billing-worker/src/production-entry.js
          git commit -m "Repair formatx1 site and publish Android 1.0.4"
          git pull --rebase origin master
          git push origin HEAD:master
