name: Deploy FormatX to Cloudflare Pages

on:
  push:
    branches:
      - master
    paths:
      - "docs/scifi-ui/**"
      - ".github/workflows/deploy-cloudflare-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy formatxsuite.pages.dev
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure Cloudflare Pages project exists
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ffd7d28ea7c6a510549dc9363619c8c5
          command: pages project create formatxsuite --production-branch=master

      - name: Deploy production site
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ffd7d28ea7c6a510549dc9363619c8c5
          command: pages deploy docs/scifi-ui --project-name=formatxsuite --branch=master
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish site URL
        run: |
          echo "## FormatX Cloudflare Pages" >> "$GITHUB_STEP_SUMMARY"
          echo "Production URL: https://formatxsuite.pages.dev" >> "$GITHUB_STEP_SUMMARY"
