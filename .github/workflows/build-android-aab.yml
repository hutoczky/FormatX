name: Build FormatX Android AAB

on:
  push:
    branches: [master]
    paths:
      - "android-app/**"
      - ".github/workflows/build-android-aab.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: formatx-android-aab
  cancel-in-progress: true

jobs:
  build-aab:
    name: Build Android App Bundles
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 9.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.5.0"

      - name: Install Android SDK components
        shell: bash
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          test -n "$SDK_ROOT"
          SDKMANAGER="$(find "$SDK_ROOT/cmdline-tools" -type f -name sdkmanager | sort -V | tail -n 1)"
          test -x "$SDKMANAGER"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0"

      - name: Build debug and release bundles
        shell: bash
        run: |
          set -euo pipefail
          gradle --no-daemon --stacktrace --warning-mode all --project-dir android-app \
            :app:bundleDebug :app:bundleRelease

      - name: Publish AAB files
        shell: bash
        run: |
          set -euo pipefail
          DEST="docs/scifi-ui/downloads"
          mkdir -p "$DEST"

          DEBUG_SRC="android-app/app/build/outputs/bundle/debug/app-debug.aab"
          RELEASE_SRC="android-app/app/build/outputs/bundle/release/app-release.aab"

          test -f "$DEBUG_SRC"
          test -f "$RELEASE_SRC"

          cp "$DEBUG_SRC" "$DEST/FormatX-Suite-Pro-Android-1.0.4-debug.aab"
          cp "$RELEASE_SRC" "$DEST/FormatX-Suite-Pro-Android-1.0.4-release-unsigned.aab"

          sha256sum "$DEST/FormatX-Suite-Pro-Android-1.0.4-debug.aab" \
            > "$DEST/FormatX-Suite-Pro-Android-1.0.4-debug.aab.sha256"
          sha256sum "$DEST/FormatX-Suite-Pro-Android-1.0.4-release-unsigned.aab" \
            > "$DEST/FormatX-Suite-Pro-Android-1.0.4-release-unsigned.aab.sha256"

      - name: Commit generated bundles
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/scifi-ui/downloads/FormatX-Suite-Pro-Android-1.0.4-*.aab*
          if git diff --cached --quiet; then
            echo "No AAB changes to commit."
            exit 0
          fi
          git commit -m "Publish FormatX Android 1.0.4 AAB files"
          git push

      - name: Upload AAB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FormatX-Suite-Pro-Android-1.0.4-AAB
          path: |
            docs/scifi-ui/downloads/FormatX-Suite-Pro-Android-1.0.4-debug.aab
            docs/scifi-ui/downloads/FormatX-Suite-Pro-Android-1.0.4-debug.aab.sha256
            docs/scifi-ui/downloads/FormatX-Suite-Pro-Android-1.0.4-release-unsigned.aab
            docs/scifi-ui/downloads/FormatX-Suite-Pro-Android-1.0.4-release-unsigned.aab.sha256
          if-no-files-found: error
          retention-days: 30
