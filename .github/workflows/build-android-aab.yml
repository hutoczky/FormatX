name: Build FormatX Android AAB

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: formatx-android-aab
  cancel-in-progress: true

jobs:
  build-aab:
    name: Build Android App Bundles
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 9.5
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a
        with:
          gradle-version: "9.5.0"

      - name: Install Android SDK components
        shell: bash
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          test -n "$SDK_ROOT"
          SDKMANAGER="$(find "$SDK_ROOT/cmdline-tools" -type f -name sdkmanager | sort -V | tail -n 1)"
          test -x "$SDKMANAGER"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0"

      - name: Verify current Android version
        shell: bash
        run: |
          set -euo pipefail
          grep -F 'versionCode = 8' android-app/app/build.gradle.kts
          grep -F 'versionName = "1.0.6"' android-app/app/build.gradle.kts
          ! grep -R -Fq 'hutoczky.github.io' android-app/app/src/main

      - name: Build debug and unsigned release bundles
        shell: bash
        run: |
          set -euo pipefail
          gradle --no-daemon --stacktrace --warning-mode all --project-dir android-app \
            :app:bundleDebug :app:bundleRelease

      - name: Prepare AAB artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          DEBUG_SRC="android-app/app/build/outputs/bundle/debug/app-debug.aab"
          RELEASE_SRC="android-app/app/build/outputs/bundle/release/app-release.aab"
          test -s "$DEBUG_SRC"
          test -s "$RELEASE_SRC"
          cp "$DEBUG_SRC" dist/FormatX-Suite-Pro-Android-1.0.6-debug.aab
          cp "$RELEASE_SRC" dist/FormatX-Suite-Pro-Android-1.0.6-release-unsigned.aab
          sha256sum dist/*.aab > dist/FormatX-Suite-Pro-Android-1.0.6-AAB.sha256

      - name: Upload AAB artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: FormatX-Suite-Pro-Android-1.0.6-AAB
          path: |
            dist/FormatX-Suite-Pro-Android-1.0.6-debug.aab
            dist/FormatX-Suite-Pro-Android-1.0.6-release-unsigned.aab
            dist/FormatX-Suite-Pro-Android-1.0.6-AAB.sha256
          if-no-files-found: error
          retention-days: 14
