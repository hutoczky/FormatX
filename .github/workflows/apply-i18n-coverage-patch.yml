name: Apply i18n coverage patch

on:
  push:
    branches:
      - agent/bilingual-hu-en-site
    paths:
      - "tools/apply-i18n-coverage-patch.py"
      - ".github/workflows/apply-i18n-coverage-patch.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/bilingual-hu-en-site
          fetch-depth: 0

      - name: Apply deterministic translation patch
        run: python3 tools/apply-i18n-coverage-patch.py

      - name: Commit patched catalog
        run: |
          if git diff --quiet; then
            echo "Translation coverage patch already applied."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/scifi-ui/scripts/i18n.js tools/validate-site-i18n.py
          git commit -m "Complete bilingual source coverage"
          git push origin HEAD:agent/bilingual-hu-en-site
