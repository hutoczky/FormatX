name: Apply reviewed production deploy test command once

on:
  push:
    branches:
      - feature/website-license-center
    paths:
      - '.github/workflows/patch-deploy-license-tests-once.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: feature/website-license-center
          fetch-depth: 0
      - name: Use local D1 lifecycle tests before deployment
        shell: python
        run: |
          from pathlib import Path

          path = Path('.github/workflows/deploy-formatx-custom-domain.yml')
          text = path.read_text(encoding='utf-8')
          old = '          npm test -- --run\n'
          new = '          npm run test:license\n'
          if old not in text:
              raise SystemExit('Expected production test command not found.')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
      - name: Commit patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/deploy-formatx-custom-domain.yml
          git commit -m 'fix: run local license lifecycle tests before deploy'
          git push origin HEAD:feature/website-license-center
