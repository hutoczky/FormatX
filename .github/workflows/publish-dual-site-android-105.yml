name: Publish dual-site FormatX Android 1.0.5

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/publish-dual-site-android-105.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 9.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.5.0"

      - name: Install Android SDK
        shell: bash
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          test -n "$SDK_ROOT"
          SDKMANAGER="$(find "$SDK_ROOT/cmdline-tools" -type f -name sdkmanager | sort -V | tail -n 1)"
          test -x "$SDKMANAGER"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0"

      - name: Verify exact dual-site source
        shell: bash
        run: |
          set -euo pipefail
          MAIN="android-app/app/src/main/java/hu/formatx/suite/MainActivity.java"
          BUILD="android-app/app/build.gradle.kts"
          grep -F 'PRIMARY_HOST = "formatx1.formatx.workers.dev"' "$MAIN"
          grep -F 'PRIMARY_PATH = "/scifi-ui/"' "$MAIN"
          grep -F 'FALLBACK_HOST = "hutoczky.github.io"' "$MAIN"
          grep -F 'FALLBACK_PATH = "/FormatX/scifi-ui/"' "$MAIN"
          grep -F 'FormatXAndroid/1.0.5' "$MAIN"
          grep -F 'versionCode = 7' "$BUILD"
          grep -F 'versionName = "1.0.5"' "$BUILD"

      - name: Build installable APK
        shell: bash
        run: |
          set -euo pipefail
          gradle --no-daemon --stacktrace --warning-mode all --project-dir android-app :app:assembleDebug

      - name: Publish APK files
        shell: bash
        run: |
          set -euo pipefail
          APK="android-app/app/build/outputs/apk/debug/app-debug.apk"
          DEST="docs/scifi-ui/downloads/FormatX-Suite-Pro-Android.apk"
          VERSIONED="docs/scifi-ui/downloads/FormatX-Suite-Pro-Android-1.0.5.apk"
          MANIFEST="docs/scifi-ui/downloads/android-update.json"

          test -s "$APK"
          unzip -t "$APK" >/dev/null
          test "$(stat -c '%s' "$APK")" -gt 800000
          cp "$APK" "$DEST"
          cp "$APK" "$VERSIONED"
          SHA256="$(sha256sum "$DEST" | awk '{print $1}')"
          printf '%s  %s\n' "$SHA256" "$DEST" > docs/scifi-ui/downloads/FormatX-Suite-Pro-Android.apk.sha256

          SHA256="$SHA256" python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path('docs/scifi-ui/downloads/android-update.json')
          data = json.loads(path.read_text(encoding='utf-8'))
          data.update({
              'versionCode': 7,
              'versionName': '1.0.5',
              'apkUrl': 'https://hutoczky.github.io/FormatX/scifi-ui/downloads/FormatX-Suite-Pro-Android.apk',
              'sha256': os.environ['SHA256'],
              'mandatory': False,
              'notes': 'Elsődleges formatx1 Worker és automatikus GitHub Pages tartalék; mindkét oldal kézzel is megnyitható.'
          })
          path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          obsolete = Path('docs/scifi-ui/android-update.json')
          if obsolete.exists():
              obsolete.unlink()
          PY

          test "$(python3 -c "import json; print(json.load(open('$MANIFEST'))['sha256'])")" = "$SHA256"
          echo "Dual-site APK SHA256: $SHA256"

      - name: Commit generated APK
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/publish-dual-site-android-105.yml
          git add docs/scifi-ui/downloads
          git add -A docs/scifi-ui/android-update.json
          git commit -m "Publish dual-site FormatX Android 1.0.5 APK"
          git pull --rebase origin master
          git push origin HEAD:master
