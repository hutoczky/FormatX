name: Fix Android website URL and publish APK

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/fix-android-site-and-publish.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-build-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 9.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.5.0"

      - name: Install Android SDK components
        shell: bash
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          test -n "$SDK_ROOT"
          SDKMANAGER="$(find "$SDK_ROOT/cmdline-tools" -type f -name sdkmanager | sort -V | tail -n 1)"
          test -x "$SDKMANAGER"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0"

      - name: Correct Android production URLs and version
        shell: bash
        run: |
          set -euo pipefail

          find android-app -type f \( -name '*.java' -o -name '*.kt' -o -name '*.kts' -o -name '*.xml' \) -print0 |
            xargs -0 sed -i \
              -e 's/formatxsuite\.formatx\.workers\.dev/formatx1.formatx.workers.dev/g' \
              -e 's/FormatXAndroid\/1\.0\.2/FormatXAndroid\/1.0.3/g' \
              -e 's/appVersion", "1\.0\.2"/appVersion", "1.0.3"/g'

          sed -i 's/private static final String PRIMARY_PATH = "\/";/private static final String PRIMARY_PATH = "\/scifi-ui\/";/' \
            android-app/app/src/main/java/hu/formatx/suite/MainActivity.java

          sed -i \
            -e 's/versionCode = 4/versionCode = 5/' \
            -e 's/versionName = "1\.0\.2"/versionName = "1.0.3"/' \
            android-app/app/build.gradle.kts

          grep -F 'private static final String PRIMARY_HOST = "formatx1.formatx.workers.dev";' \
            android-app/app/src/main/java/hu/formatx/suite/MainActivity.java
          grep -F 'private static final String PRIMARY_PATH = "/scifi-ui/";' \
            android-app/app/src/main/java/hu/formatx/suite/MainActivity.java
          grep -R 'formatx1.formatx.workers.dev' android-app/app/src/main/java/hu/formatx/suite
          if grep -R 'formatxsuite.formatx.workers.dev' android-app; then
            echo 'Régi Worker host maradt az Android-kódban.' >&2
            exit 1
          fi

      - name: Build and lint corrected APK
        shell: bash
        run: |
          set -euo pipefail
          gradle --no-daemon --stacktrace --warning-mode all --project-dir android-app \
            :app:assembleDebug :app:lintDebug

      - name: Publish corrected APK to website assets
        shell: bash
        run: |
          set -euo pipefail
          APK="android-app/app/build/outputs/apk/debug/app-debug.apk"
          DEST="docs/scifi-ui/downloads/FormatX-Suite-Pro-Android.apk"
          VERSIONED="docs/scifi-ui/downloads/FormatX-Suite-Pro-Android-1.0.3.apk"
          MANIFEST="docs/scifi-ui/downloads/android-update.json"

          test -s "$APK"
          unzip -t "$APK" >/dev/null
          test "$(stat -c '%s' "$APK")" -gt 800000

          mkdir -p docs/scifi-ui/downloads
          cp "$APK" "$DEST"
          cp "$APK" "$VERSIONED"
          SHA256="$(sha256sum "$DEST" | cut -d' ' -f1)"
          printf '%s  %s\n' "$SHA256" "$DEST" > docs/scifi-ui/downloads/FormatX-Suite-Pro-Android.apk.sha256

          SHA256="$SHA256" python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path('docs/scifi-ui/downloads/android-update.json')
          data = json.loads(path.read_text(encoding='utf-8'))
          data.update({
              'versionCode': 5,
              'versionName': '1.0.3',
              'apkUrl': 'https://hutoczky.github.io/FormatX/scifi-ui/downloads/FormatX-Suite-Pro-Android.apk',
              'sha256': os.environ['SHA256'],
              'mandatory': False,
              'notes': 'A helyes formatx1 Worker és /scifi-ui/ kezdőoldal, javított Android WebView betöltés és frissített alkalmazáskapcsolatok.'
          })
          path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY

          python3 - <<'PY'
          from pathlib import Path
          path = Path('billing-worker/src/production-entry.js')
          if path.exists():
              text = path.read_text(encoding='utf-8').replace(
                  'FormatX-Suite-Pro-Android-1.0.2.apk',
                  'FormatX-Suite-Pro-Android-1.0.3.apk'
              )
              path.write_text(text, encoding='utf-8')
          PY

          test "$(python3 -c "import json; print(json.load(open('$MANIFEST'))['sha256'])")" = "$SHA256"
          echo "Corrected APK SHA256: $SHA256"

      - name: Commit corrected source and APK
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/fix-android-site-and-publish.yml
          git add android-app docs/scifi-ui/downloads billing-worker/src/production-entry.js
          git commit -m "Fix Android app production website URL and publish 1.0.3"
          git push origin HEAD:master
