name: Clarify FormatX platform status

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/clarify-platform-status.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  clarify-texts:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Rewrite misleading platform text
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          exact = {
            'README.md': [
              ('Moduláris, auditálható formázóplatform mesterséges intelligenciával és rendszerdiagnosztikával.\nWindows‑alapú eszköztár hordozható meghajtók, lemezek és rendszerfunkciók kezelésére, fejlett AI asszisztenciával.',
               'Moduláris, auditálható technikusi platform mesterséges intelligenciával és rendszerdiagnosztikával.\n\n**Jelenlegi állapot:** az asztali prototípus Windows alatt működik, mert WinUI 3 és Windows-specifikus lemezkezelő szolgáltatásokat használ. A natív Linux/Bazzite kiadás fejlesztés alatt áll, és ez a projekt elsődleges célplatformja. A macOS támogatás későbbi fejlesztési irány.'),
              ('- .NET8 célkeret', '- .NET 10 Windows célkeret a jelenlegi prototípusban'),
            ],
            'billing-worker/src/project-ai.js': [
              ('- Linux, especially Bazzite-compatible Linux environments, is the primary supported platform.', '- Linux, especially Bazzite-compatible environments, is the primary development target. A native Linux desktop build is not available yet.'),
              ('- The web interface and Android client provide supplementary access across supported platforms.', '- The current desktop prototype runs on Windows because it uses WinUI 3 and Windows-specific disk-management services. The web interface and Android client remain available as supplementary access.'),
              ('- Windows and macOS are additionally supported alongside the primary Linux/Bazzite platform.', '- Windows is the platform of the current desktop prototype. macOS support is planned for a later development phase.'),
              ('A FormatX elsődleges támogatott platformja a Linux, különösen a Bazzite-kompatibilis környezet. A Windows és a macOS kiegészítő támogatást kap, a webes felület és az Android kliens pedig többplatformos hozzáférést biztosít.', 'A FormatX elsődleges fejlesztési célplatformja a Linux, különösen a Bazzite-kompatibilis környezet. A natív Linux asztali kiadás még fejlesztés alatt áll. A jelenlegi asztali prototípus Windows alatt működik; a macOS támogatás későbbi fejlesztési irány. A webes felület és az Android kliens ettől függetlenül használható.'),
              ('Linux, especially Bazzite-compatible environments, is the primary supported platform. Windows and macOS receive additional support, while the web interface and Android client provide cross-platform access.', 'Linux, especially Bazzite-compatible environments, is the primary development target. The native Linux desktop build is still under development. The current desktop prototype runs on Windows, while macOS support is planned for a later phase. The web interface and Android client remain available.'),
            ],
            'docs/scifi-ui/index.html': [
              ('Fejlett, egységes technikusi platform formázáshoz, rendszerdiagnosztikához, telepítéshez és cross-platform munkafolyamatokhoz.', 'Fejlett technikusi platform formázáshoz, diagnosztikához és rendszer-előkészítéshez. A jelenlegi asztali prototípus Windows alatt működik; a natív Linux/Bazzite kiadás fejlesztés alatt áll.'),
              ('Linux / Bazzite technikusi mag', 'Linux / Bazzite elsődleges célplatform'),
              ('Elsődleges Linux / Bazzite támogatás, valamint Windows- és macOS-kompatibilitás.', 'Linux / Bazzite az elsődleges fejlesztési cél. A jelenlegi asztali prototípus Windowsos; a natív Linux- és macOS-kiadás még nem érhető el.'),
              ('A projekt elsődleges technikusi platformja a Linux, különösen a Bazzite-kompatibilis környezet. A Windows és a macOS kiegészítő támogatást kap, a webes felület és az Android-kliens pedig többplatformos hozzáférést biztosít.', 'A projekt elsődleges fejlesztési célplatformja a Linux, különösen a Bazzite-kompatibilis környezet. A natív Linux asztali alkalmazás még fejlesztés alatt áll. A jelenlegi prototípus Windows alatt működik, a macOS támogatás pedig későbbi fejlesztési irány. A webes felület és az Android-kliens már használható.'),
              ('<strong>3</strong><em>LNX · WIN · MAC</em>', '<strong>1 + 2</strong><em>WIN MOST · LNX/MAC FEJLESZTÉS</em>'),
              ('<b>LINUX / BAZZITE · PRIMARY</b><b>WINDOWS</b><b>macOS</b>', '<b>LINUX / BAZZITE · CÉLPLATFORM</b><b>WINDOWS · JELENLEGI PROTOTÍPUS</b><b>macOS · TERVEZETT</b>'),
            ],
            'docs/scifi-ui/scripts/landing.js': [
              ('Fejlett, egységes technikusi platform formázáshoz, rendszerdiagnosztikához, telepítéshez és cross-platform munkafolyamatokhoz.', 'Fejlett technikusi platform formázáshoz, diagnosztikához és rendszer-előkészítéshez. A jelenlegi asztali prototípus Windows alatt működik; a natív Linux/Bazzite kiadás fejlesztés alatt áll.'),
              ('Advanced, unified technician platform for formatting, system diagnostics, deployment and cross-platform workflows.', 'Advanced technician platform for formatting, diagnostics and system preparation. The current desktop prototype runs on Windows; the native Linux/Bazzite build is still under development.'),
              ('Elsődleges Linux / Bazzite támogatás, valamint Windows- és macOS-kompatibilitás.', 'Linux / Bazzite az elsődleges fejlesztési cél. A jelenlegi asztali prototípus Windowsos; a natív Linux- és macOS-kiadás még nem érhető el.'),
              ('Primary Linux / Bazzite support with additional Windows and macOS compatibility.', 'Linux / Bazzite is the primary development target. The current desktop prototype is Windows-only; native Linux and macOS builds are not available yet.'),
            ],
          }

          changed = set()
          for filename, pairs in exact.items():
            path = Path(filename)
            if not path.exists():
              continue
            text = path.read_text(encoding='utf-8')
            original = text
            for old, new in pairs:
              text = text.replace(old, new)
            if text != original:
              path.write_text(text, encoding='utf-8')
              changed.add(filename)

          # Apply safe terminology cleanup across additional public HTML/JS pages.
          broad_pairs = [
            ('Linux / Bazzite technikusi mag', 'Linux / Bazzite elsődleges célplatform'),
            ('Linux / Bazzite technician core', 'Linux / Bazzite primary development target'),
            ('Elsődleges Linux / Bazzite támogatás, valamint Windows- és macOS-kompatibilitás.', 'Linux / Bazzite az elsődleges fejlesztési cél. A jelenlegi asztali prototípus Windowsos; a natív Linux- és macOS-kiadás még nem érhető el.'),
            ('Primary Linux / Bazzite support with additional Windows and macOS compatibility.', 'Linux / Bazzite is the primary development target. The current desktop prototype is Windows-only; native Linux and macOS builds are not available yet.'),
          ]
          for path in list(Path('docs/scifi-ui').glob('*.html')) + list(Path('docs/scifi-ui/scripts').glob('*.js')):
            text = path.read_text(encoding='utf-8')
            original = text
            for old, new in broad_pairs:
              text = text.replace(old, new)
            if text != original:
              path.write_text(text, encoding='utf-8')
              changed.add(str(path))

          required = {'README.md', 'billing-worker/src/project-ai.js', 'docs/scifi-ui/index.html'}
          missing = required - changed
          if missing:
            raise SystemExit(f'Required text files were not updated: {sorted(missing)}')

          print('Updated files:')
          for filename in sorted(changed):
            print('-', filename)
          PY

      - name: Commit clarified wording
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
          git add README.md billing-worker/src/project-ai.js docs/scifi-ui
          git commit -m "Clarify current Windows prototype and Linux development status"
          git pull --rebase origin master
          git push origin HEAD:master
