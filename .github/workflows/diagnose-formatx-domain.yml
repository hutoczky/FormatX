name: Diagnose FormatX domain

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/diagnose-formatx-domain.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: formatx-domain-diagnostics
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install DNS tools
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v dig >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq dnsutils
          fi

      - name: Collect Cloudflare, DNS and HTTPS diagnostics
        shell: bash
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ffd7d28ea7c6a510549dc9363619c8c5
        run: |
          set +e
          mkdir -p diagnostics
          REPORT="diagnostics/formatxsuite-domain-status.txt"
          API="https://api.cloudflare.com/client/v4"
          AUTH=(-H "Authorization: Bearer ${CF_API_TOKEN}" -H "Content-Type: application/json")

          {
            echo "FormatX domain live diagnostics"
            echo "Generated UTC: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo
            echo "=== Authoritative delegation ==="
            echo "Cloudflare resolver NS:"
            dig @1.1.1.1 +noall +answer formatxsuite.com NS
            echo "Google resolver NS:"
            dig @8.8.8.8 +noall +answer formatxsuite.com NS
            echo

            echo "=== Public DNS records ==="
            for NAME in formatxsuite.com www.formatxsuite.com; do
              for SERVER in 1.1.1.1 8.8.8.8; do
                echo "-- ${NAME} via ${SERVER} --"
                dig @"${SERVER}" +noall +answer "${NAME}" A
                dig @"${SERVER}" +noall +answer "${NAME}" AAAA
                dig @"${SERVER}" +noall +answer "${NAME}" CNAME
              done
            done
            echo

            echo "=== Cloudflare zone ==="
            ZONE_JSON="$(curl -sS "${AUTH[@]}" "${API}/zones?name=formatxsuite.com")"
            echo "$ZONE_JSON" | jq '{success, errors, messages, result: [.result[]? | {name,status,name_servers,original_name_servers}]}'
            ZONE_ID="$(echo "$ZONE_JSON" | jq -r '.result[0].id // empty')"
            echo

            if [[ -n "$ZONE_ID" ]]; then
              echo "=== Cloudflare DNS records ==="
              for NAME in formatxsuite.com www.formatxsuite.com; do
                echo "-- ${NAME} --"
                curl -sS "${AUTH[@]}" "${API}/zones/${ZONE_ID}/dns_records?name=${NAME}&per_page=100" \
                  | jq '{success, errors, messages, result: [.result[]? | {type,name,content,proxied,proxiable,ttl,comment}]}'
              done
              echo

              echo "=== Cloudflare Worker routes ==="
              curl -sS "${AUTH[@]}" "${API}/zones/${ZONE_ID}/workers/routes" \
                | jq '{success, errors, messages, result: [.result[]? | {pattern,script,environment}]}'
              echo
            else
              echo "No Cloudflare zone ID was returned."
              echo
            fi

            echo "=== Cloudflare Worker custom domains ==="
            curl -sS "${AUTH[@]}" "${API}/accounts/${CF_ACCOUNT_ID}/workers/domains" \
              | jq '{success, errors, messages, result: [.result[]? | {hostname,service,environment,zone_id}]}'
            echo

            echo "=== Cloudflare Worker scripts ==="
            curl -sS "${AUTH[@]}" "${API}/accounts/${CF_ACCOUNT_ID}/workers/scripts" \
              | jq '{success, errors, messages, result: [.result[]? | {id,created_on,modified_on}]}'
            echo

            echo "=== HTTPS checks ==="
            for URL in \
              'https://formatxsuite.com/' \
              'https://formatxsuite.com/scifi-ui/?lang=hu' \
              'https://www.formatxsuite.com/' \
              'https://www.formatxsuite.com/scifi-ui/?lang=hu' \
              'https://formatx.formatx.workers.dev/scifi-ui/?lang=hu'; do
              echo "-- ${URL} --"
              BODY="$(mktemp)"
              HEADERS="$(mktemp)"
              CURL_RESULT="$(curl -sS -L --connect-timeout 10 --max-time 30 -D "$HEADERS" -o "$BODY" \
                -w 'http_code=%{http_code} remote_ip=%{remote_ip} final_url=%{url_effective} ssl_verify=%{ssl_verify_result}' \
                "$URL" 2>&1)"
              CURL_EXIT=$?
              echo "curl_exit=${CURL_EXIT} ${CURL_RESULT}"
              grep -Ei '^(HTTP/|server:|location:|cf-ray:|content-type:|strict-transport-security:)' "$HEADERS" || true
              if grep -Fq 'class="reference-commerce"' "$BODY"; then
                echo "modern_formatx_marker=true"
              else
                echo "modern_formatx_marker=false"
              fi
              if grep -Fqi 'Registered at' "$BODY" || grep -Fqi 'spaceship' "$BODY"; then
                echo "spaceship_parking_marker=true"
              else
                echo "spaceship_parking_marker=false"
              fi
              echo
            done
          } > "$REPORT" 2>&1

          cat "$REPORT"

      - name: Commit diagnostic report
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          test -s diagnostics/formatxsuite-domain-status.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add diagnostics/formatxsuite-domain-status.txt
          git commit -m "Publish FormatX domain diagnostics" || exit 0
          git pull --rebase origin master
          git push origin HEAD:master
