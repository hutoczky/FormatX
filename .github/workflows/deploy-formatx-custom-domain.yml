name: Attach FormatX custom domains

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/deploy-formatx-custom-domain.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: formatx-custom-domain-repair
  cancel-in-progress: false

jobs:
  attach:
    name: Attach formatxsuite.com to formatx
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure renamed Worker custom domains
        shell: python
        run: |
          import json
          from pathlib import Path

          config = Path("billing-worker/wrangler.jsonc")
          data = json.loads(config.read_text(encoding="utf-8"))
          data["name"] = "formatx"
          data["routes"] = [
              {"pattern": "formatxsuite.com", "custom_domain": True},
              {"pattern": "www.formatxsuite.com", "custom_domain": True},
          ]
          config.write_text(json.dumps(data, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")

      - name: Remove old Spaceship parking DNS records
        continue-on-error: true
        shell: bash
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          API="https://api.cloudflare.com/client/v4"
          AUTH=(-H "Authorization: Bearer ${CF_API_TOKEN}" -H "Content-Type: application/json")

          ZONE_JSON="$(curl -fsS "${AUTH[@]}" "${API}/zones?name=formatxsuite.com&status=active")"
          echo "$ZONE_JSON" | jq -e '.success == true and (.result | length) == 1' >/dev/null
          ZONE_ID="$(echo "$ZONE_JSON" | jq -r '.result[0].id')"

          for NAME in formatxsuite.com www.formatxsuite.com; do
            RECORDS="$(curl -fsS "${AUTH[@]}" "${API}/zones/${ZONE_ID}/dns_records?name=${NAME}&per_page=100")"
            echo "$RECORDS" | jq -e '.success == true' >/dev/null
            while IFS=$'\t' read -r ID TYPE CONTENT; do
              case "$TYPE" in
                A|AAAA|CNAME)
                  echo "Deleting old ${TYPE} ${NAME} -> ${CONTENT}"
                  curl -fsS -X DELETE "${AUTH[@]}" "${API}/zones/${ZONE_ID}/dns_records/${ID}" | jq -e '.success == true' >/dev/null
                  ;;
              esac
            done < <(echo "$RECORDS" | jq -r '.result[] | [.id, .type, .content] | @tsv')
          done

      - name: Deploy formatx Worker and create custom domains
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ffd7d28ea7c6a510549dc9363619c8c5
          workingDirectory: billing-worker
          command: deploy --name formatx

      - name: Commit permanent Worker configuration
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add billing-worker/wrangler.jsonc
          if git diff --cached --quiet; then
            echo "Worker configuration already current."
            exit 0
          fi
          git commit -m "Use formatx Worker custom domains"
          git pull --rebase origin master
          git push origin HEAD:master

      - name: Verify FormatX custom domains
        shell: bash
        run: |
          set -euo pipefail
          verify() {
            local url="$1"
            local output
            output="$(mktemp)"
            for attempt in $(seq 1 30); do
              if curl -fsSL --connect-timeout 10 --max-time 30 \
                  -H 'Cache-Control: no-cache' "$url" -o "$output" \
                  && grep -Fq 'class="reference-commerce"' "$output"; then
                echo "Verified: $url"
                return 0
              fi
              sleep 10
            done
            echo "Verification failed: $url" >&2
            return 1
          }

          verify 'https://formatxsuite.com/scifi-ui/?lang=hu'
          verify 'https://www.formatxsuite.com/scifi-ui/?lang=hu'
