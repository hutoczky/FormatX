name: Manual FormatX production deploy
run-name: Manual FormatX production deploy from ${{ github.sha }}

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: formatx-manual-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Manual deploy and verification
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate production configuration
        shell: python
        run: |
          import json
          from pathlib import Path

          config = Path("billing-worker/wrangler.jsonc")
          data = json.loads(config.read_text(encoding="utf-8"))
          assert data["name"] == "formatx"
          assert data["main"] == "src/production-entry.js"
          assert data["assets"]["directory"] == "../docs"
          assert data["assets"]["run_worker_first"] is True
          expected = {
              ("formatxsuite.com", True),
              ("www.formatxsuite.com", True),
          }
          actual = {
              (route.get("pattern"), route.get("custom_domain"))
              for route in data.get("routes", [])
          }
          assert expected.issubset(actual)
          print("Production configuration is valid.")

      - name: Require manual Cloudflare API token
        shell: bash
        env:
          RAW_CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          TOKEN="$(printf '%s' "$RAW_CF_TOKEN" | tr -d '\r\n')"
          TOKEN="${TOKEN#Authorization: Bearer }"
          TOKEN="${TOKEN#Bearer }"
          TOKEN="$(printf '%s' "$TOKEN" | xargs)"
          if [ "${#TOKEN}" -lt 20 ]; then
            echo "This manual backup workflow requires the CLOUDFLARE_API_TOKEN repository secret." >&2
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "CLOUDFLARE_API_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: billing-worker/package-lock.json

      - name: Install Worker dependencies
        working-directory: billing-worker
        run: npm ci

      - name: Deploy formatx Worker
        working-directory: billing-worker
        env:
          CLOUDFLARE_ACCOUNT_ID: ffd7d28ea7c6a510549dc9363619c8c5
        run: npx wrangler deploy --name formatx

      - name: Verify clean production URL
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 36); do
            headers="$(mktemp)"
            body="$(mktemp)"
            if curl -fsSL --connect-timeout 10 --max-time 30 \
                -D "$headers" -o "$body" \
                -H 'Cache-Control: no-cache' \
                'https://www.formatxsuite.com/'; then
              if grep -Fq 'FormatX Suite Pro' "$body" \
                 && ! grep -Fiq '^location: .*/scifi-ui/' "$headers"; then
                echo "Verified clean production URL."
                rm -f "$headers" "$body"
                exit 0
              fi
            fi
            rm -f "$headers" "$body"
            sleep 10
          done
          echo "Production verification failed." >&2
          exit 1
