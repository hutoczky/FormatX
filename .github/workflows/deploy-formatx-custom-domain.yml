name: Attach FormatX custom domains

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/deploy-formatx-custom-domain.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: formatx-custom-domain-repair
  cancel-in-progress: false

jobs:
  attach:
    name: Attach formatxsuite.com to formatx
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure renamed Worker and clean URL routing
        shell: python
        run: |
          import json
          from pathlib import Path

          config = Path("billing-worker/wrangler.jsonc")
          data = json.loads(config.read_text(encoding="utf-8"))
          data["name"] = "formatx"
          data["routes"] = [
              {"pattern": "formatxsuite.com", "custom_domain": True},
              {"pattern": "www.formatxsuite.com", "custom_domain": True},
          ]
          assets = data.setdefault("assets", {})
          assets["run_worker_first"] = True
          config.write_text(json.dumps(data, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")

      - name: Commit permanent Worker configuration
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add billing-worker/wrangler.jsonc
          if git diff --cached --quiet; then
            echo "Worker configuration already current."
          else
            git commit -m "Use formatx Worker with clean www custom domain"
            git pull --rebase origin master
            git push origin HEAD:master
          fi

      - name: Detect Cloudflare token
        id: token
        shell: bash
        env:
          RAW_CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          TOKEN="$(printf '%s' "$RAW_CF_TOKEN" | tr -d '\r\n')"
          TOKEN="${TOKEN#Bearer }"
          TOKEN="${TOKEN#bearer }"
          TOKEN="${TOKEN#\"}"
          TOKEN="${TOKEN%\"}"
          TOKEN="${TOKEN#\'}"
          TOKEN="${TOKEN%\'}"
          TOKEN="$(printf '%s' "$TOKEN" | xargs)"
          if [ "${#TOKEN}" -lt 20 ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare token is missing; repository configuration was still saved."
            exit 0
          fi
          echo "::add-mask::$TOKEN"
          echo "NORMALIZED_CF_TOKEN=$TOKEN" >> "$GITHUB_ENV"
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Install Worker dependencies
        if: steps.token.outputs.available == 'true'
        working-directory: billing-worker
        shell: bash
        run: npm ci

      - name: Deploy formatx Worker and create custom domains
        if: steps.token.outputs.available == 'true'
        working-directory: billing-worker
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.NORMALIZED_CF_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ffd7d28ea7c6a510549dc9363619c8c5
        run: npx wrangler deploy --name formatx

      - name: Verify clean FormatX URL
        if: steps.token.outputs.available == 'true'
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 36); do
            if curl -fsSL --connect-timeout 10 --max-time 30 \
                -H 'Cache-Control: no-cache' 'https://www.formatxsuite.com/' \
                | grep -Fq 'class="reference-commerce"'; then
              echo "Verified: https://www.formatxsuite.com/"
              exit 0
            fi
            sleep 10
          done
          echo "Verification failed: https://www.formatxsuite.com/" >&2
          exit 1
