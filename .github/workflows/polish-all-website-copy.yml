name: Polish all FormatX website copy

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/polish-all-website-copy.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  polish-copy:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Polish public Hungarian and English text
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          changed = set()

          def patch(filename, pairs):
              path = Path(filename)
              if not path.exists():
                  print(f'SKIP missing: {filename}')
                  return
              text = path.read_text(encoding='utf-8')
              original = text
              for old, new in pairs:
                  if old not in text:
                      print(f'WARN not found in {filename}: {old[:90]}')
                  text = text.replace(old, new)
              if text != original:
                  path.write_text(text, encoding='utf-8')
                  changed.add(filename)

