name: Publish Android APK and AAB links

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/publish-android-format-links.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-links:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Add APK and AAB buttons
        shell: python
        run: |
          from pathlib import Path

          page = Path("docs/scifi-ui/index.html")
          text = page.read_text(encoding="utf-8")
          old = '''            <a class="outline-button" href="https://formatx1.formatx.workers.dev/download/android?v=1.0.4" download="FormatX-Suite-Pro-Android-1.0.4.apk"><span data-text="androidApp">Android alkalmazás letöltése</span><i aria-hidden="true">↓</i></a>'''
          new = '''            <a class="outline-button" href="./downloads/FormatX-Suite-Pro-Android-1.0.4.apk" download="FormatX-Suite-Pro-Android-1.0.4.apk"><span>Android APK · telepítés</span><i aria-hidden="true">↓</i></a>
            <a class="outline-button" href="./downloads/FormatX-Suite-Pro-Android-1.0.4-release-unsigned.aab" download="FormatX-Suite-Pro-Android-1.0.4-release-unsigned.aab" title="Google Play Console csomag; végleges feltöltés előtt upload-kulccsal aláírandó"><span>Android AAB · Play Console</span><i aria-hidden="true">↓</i></a>'''
          if old not in text:
              raise SystemExit("A cserélendő Android letöltési gomb nem található.")
          page.write_text(text.replace(old, new, 1), encoding="utf-8")

      - name: Verify linked files
        shell: bash
        run: |
          set -euo pipefail
          test -s docs/scifi-ui/downloads/FormatX-Suite-Pro-Android-1.0.4.apk
          test -s docs/scifi-ui/downloads/FormatX-Suite-Pro-Android-1.0.4-release-unsigned.aab
          grep -F 'FormatX-Suite-Pro-Android-1.0.4.apk' docs/scifi-ui/index.html
          grep -F 'FormatX-Suite-Pro-Android-1.0.4-release-unsigned.aab' docs/scifi-ui/index.html

      - name: Commit website links
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/scifi-ui/index.html
          if git diff --cached --quiet; then
            echo "No website link changes to commit."
            exit 0
          fi
          git commit -m "Expose Android APK and AAB downloads"
          git push
