name: Validate checkout and bilingual 2041 site

on:
  pull_request:
    paths:
      - "docs/**"
      - "billing-worker/**"
      - "tools/validate-site-i18n.py"
      - ".github/workflows/validate-checkout.yml"
  push:
    branches:
      - master
    paths:
      - "docs/**"
      - "billing-worker/**"
      - "tools/validate-site-i18n.py"
      - ".github/workflows/validate-checkout.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check JavaScript syntax
        run: |
          node --check docs/scifi-ui/scripts/checkout.js
          node --check docs/scifi-ui/scripts/checkout-language.js
          node --check docs/scifi-ui/scripts/site.js
          node --check docs/scifi-ui/scripts/i18n.js
          node --check docs/scifi-ui/scripts/landing.js
          node --check docs/scifi-ui/scripts/payment-status.js
          node --check billing-worker/src/live-entry.js

      - name: Run exhaustive bilingual content audit
        run: python3 tools/validate-site-i18n.py

      - name: Validate payment data and 2041 visual system
        run: |
          python3 - <<'PY'
          from pathlib import Path
          from html.parser import HTMLParser

          class Parser(HTMLParser):
              pass

          root = Path('.')
          html_files = [
              root / 'docs/index.html',
              root / 'docs/404.html',
              root / 'docs/formatx-light/index.html',
              root / 'docs/scifi-ui/index.html',
              root / 'docs/scifi-ui/checkout.html',
              root / 'docs/scifi-ui/support.html',
              root / 'docs/scifi-ui/terms.html',
              root / 'docs/scifi-ui/privacy.html',
              root / 'docs/scifi-ui/payment/success.html',
              root / 'docs/scifi-ui/payment/cancel.html',
          ]

          for path in html_files:
              text = path.read_text(encoding='utf-8')
              Parser().feed(text)
              assert text.lower().count('<html') == 1, path
              assert text.lower().count('</html>') == 1, path
              assert text.lower().count('<body') == 1, path
              assert text.lower().count('</body>') == 1, path

          checkout = (root / 'docs/scifi-ui/scripts/checkout.js').read_text(encoding='utf-8')
          checkout_language = (root / 'docs/scifi-ui/scripts/checkout-language.js').read_text(encoding='utf-8')
          payment_status = (root / 'docs/scifi-ui/scripts/payment-status.js').read_text(encoding='utf-8')
          worker = (root / 'billing-worker/src/live-entry.js').read_text(encoding='utf-8')
          site = (root / 'docs/scifi-ui/scripts/site.js').read_text(encoding='utf-8')
          i18n = (root / 'docs/scifi-ui/scripts/i18n.js').read_text(encoding='utf-8')
          landing = (root / 'docs/scifi-ui/scripts/landing.js').read_text(encoding='utf-8')
          checkout_css = (root / 'docs/scifi-ui/styles/checkout.css').read_text(encoding='utf-8')
          language_css = (root / 'docs/scifi-ui/styles/language.css').read_text(encoding='utf-8')
          future_css = (root / 'docs/scifi-ui/styles/future-2041.css').read_text(encoding='utf-8')
          reference_css = (root / 'docs/scifi-ui/styles/reference-2041.css').read_text(encoding='utf-8')
          commerce_css = (root / 'docs/scifi-ui/styles/reference-commerce.css').read_text(encoding='utf-8')
          checkout_html = (root / 'docs/scifi-ui/checkout.html').read_text(encoding='utf-8')
          home_html = (root / 'docs/scifi-ui/index.html').read_text(encoding='utf-8')
          success_html = (root / 'docs/scifi-ui/payment/success.html').read_text(encoding='utf-8')
          cancel_html = (root / 'docs/scifi-ui/payment/cancel.html').read_text(encoding='utf-8')

          required_tokens = ['payment-currency', 'summary-currency', 'epc069-12-v3.1', 'buildEpcQrPayload', "new Set(['HUF', 'EUR'])", 'supported_currencies']
          combined = '\n'.join([checkout, worker, checkout_html])
          for token in required_tokens:
              assert token in combined, token

          prices = [15900, 139300, 44, 383, 39900, 349300, 110, 961, 79900, 699300, 220, 1924]
          for price in prices:
              assert str(price) in checkout, price
              assert str(price) in worker, price
              assert str(price) in checkout_language, price

          old_monthly_prices = [19900, 49900, 99900]
          for price in old_monthly_prices:
              assert f'monthly: {price}' not in checkout, price
              assert f'monthly: {price}' not in worker, price
              assert f'monthly: {price}' not in checkout_language, price

          assert 'HUF / EUR bank payment' in site
          assert 'reference-commerce.css' in home_html
          assert 'landing.js' in home_html
          assert 'FORMATX CORE ENGINE' in home_html
          assert 'checkout-preview' in home_html
          assert 'data-currency="HUF"' in home_html
          assert 'data-currency="EUR"' in home_html
          assert 'price-cards' in home_html
          assert 'feature-cards' in home_html
          assert 'trust-promises' in home_html
          assert 'data-language="hu"' in home_html
          assert 'data-language="en"' in home_html
          assert 'data-i18n-skip' in home_html
          for token in ['15 900 Ft / hó', '39 900 Ft / hó', '79 900 Ft / hó', '44 €', '110 €', '220 €']:
              assert token in home_html, token

          assert 'formatx-language' in landing
          assert 'Intl.NumberFormat' in landing
          assert 'RELEASE_API' in landing
          assert 'business_pro' in landing
          assert '39900' in landing and '110' in landing
          assert 'updateCheckoutPreview' in landing
          assert 'applyLanguage' in landing
          assert 'data-language' in landing

          assert 'i18n.js' in site
          assert 'formatx-language' in site
          assert 'formatx-language' in i18n
          assert "new Set(['hu', 'en'])" in i18n
          assert 'data-language-choice' in i18n
          assert 'MutationObserver' in i18n
          assert 'if (after !== before)' in i18n
          assert 'formatx:languagechange' in i18n
          assert "upsertAlternate('hu'" in i18n
          assert "upsertAlternate('en'" in i18n
          assert 'og:locale' in i18n
          assert 'Magyar' in i18n and 'English' in i18n
          assert 'style.textContent' not in i18n
          assert 'language.css' in i18n
          assert 'mix-blend-mode' not in i18n

          assert 'FormatX payment report' in checkout_language
          assert 'Beneficiary:' in checkout_language
          assert 'Intl.NumberFormat' in checkout_language
          assert 'data-language-choice' in payment_status
          assert 'data-hu=' in success_html and 'data-en=' in success_html
          assert 'data-hu=' in cancel_html and 'data-en=' in cancel_html

          assert 'prefers-reduced-motion' in checkout_css
          assert 'hologram-drift' in checkout_css
          assert 'mix-blend-mode' not in checkout_css
          assert checkout_css.count('{') == checkout_css.count('}')

          assert ':focus-visible' in language_css
          assert 'prefers-reduced-motion' in language_css
          assert 'prefers-contrast: more' in language_css
          assert language_css.count('{') == language_css.count('}')

          assert 'prefers-reduced-motion' in future_css
          assert 'prefers-contrast: more' in future_css
          assert 'particle-float' in future_css
          assert 'mix-blend-mode' not in future_css
          assert future_css.count('{') == future_css.count('}')

          assert 'prefers-reduced-motion' in reference_css
          assert 'prefers-contrast: more' in reference_css
          assert 'ref-particle' in reference_css
          assert 'mix-blend-mode' not in reference_css
          assert reference_css.count('{') == reference_css.count('}')

          assert 'prefers-reduced-motion' in commerce_css
          assert 'prefers-contrast: more' in commerce_css
          assert '@keyframes particle' in commerce_css
          assert 'planet-horizon' in commerce_css
          assert 'core-cube' in commerce_css
          assert 'qr-code' in commerce_css
          assert 'mix-blend-mode' not in commerce_css
          assert commerce_css.count('{') == commerce_css.count('}')

          iban = 'HU06302000141991341090015751'
          rearranged = iban[4:] + iban[:4]
          numeric = ''.join(ch if ch.isdigit() else str(ord(ch) - 55) for ch in rearranged)
          assert int(numeric) % 97 == 1

          epc = '\n'.join(['BCD', '001', '1', 'SCT', 'REVOHUHB', 'Hutóczky József', iban, 'EUR1924.00', '', '', 'FormatX FX-20260718-ABC123'])
          assert len(epc.encode('utf-8')) <= 331
          assert epc.splitlines()[:4] == ['BCD', '001', '1', 'SCT']

          redirects = [(root / 'docs/index.html').read_text(encoding='utf-8'), (root / 'docs/404.html').read_text(encoding='utf-8'), (root / 'docs/formatx-light/index.html').read_text(encoding='utf-8')]
          for redirect in redirects:
              assert 'formatx-language' in redirect
              assert "searchParams.set('lang'" in redirect
              assert 'Magyar oldal' in redirect
              assert 'English site' in redirect

          print('FormatX bilingual checkout, unified discounted prices and exact 2041 commerce validation passed.')
          PY
