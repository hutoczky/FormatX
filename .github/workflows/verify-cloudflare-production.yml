name: Verify and deploy Cloudflare production

on:
  pull_request:
    branches:
      - master
    paths:
      - ".github/workflows/verify-cloudflare-production.yml"

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy formatxsuite.pages.dev now
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Cloudflare token is present
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || {
            echo "CLOUDFLARE_API_TOKEN GitHub Secret is missing." >&2
            exit 1
          }

      - name: Ensure Cloudflare Pages project exists
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ffd7d28ea7c6a510549dc9363619c8c5
          command: pages project create formatxsuite --production-branch=master

      - name: Deploy FormatX production site
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ffd7d28ea7c6a510549dc9363619c8c5
          command: pages deploy docs/scifi-ui --project-name=formatxsuite --branch=master
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify public URL
        run: |
          for attempt in 1 2 3 4 5 6; do
            if curl --fail --silent --show-error --location --max-time 20 \
              https://formatxsuite.pages.dev/ \
              | grep -q "FormatX"; then
              echo "FormatX is live at https://formatxsuite.pages.dev"
              exit 0
            fi
            sleep 10
          done
          echo "Cloudflare deployment completed, but the public URL did not return the FormatX page in time." >&2
          exit 1
