name: Verify branded FormatX Worker URL

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/verify-branded-worker-url.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check branded and previous Worker URLs
        id: check
        shell: bash
        run: |
          set -uo pipefail

          new_url="https://formatxsuite.formatx.workers.dev/"
          old_url="https://formatxsuite.hutoczky.workers.dev/"

          new_code="$(curl --location --silent --show-error --max-time 25 --output /tmp/new.html --write-out '%{http_code}' "$new_url" || true)"
          old_code="$(curl --location --silent --show-error --max-time 25 --output /tmp/old.html --write-out '%{http_code}' "$old_url" || true)"

          new_has_formatx=false
          if [ "$new_code" = "200" ] && grep -qi "FormatX" /tmp/new.html; then
            new_has_formatx=true
          fi

          old_has_formatx=false
          if [ "$old_code" = "200" ] && grep -qi "FormatX" /tmp/old.html; then
            old_has_formatx=true
          fi

          {
            echo "new_url=$new_url"
            echo "new_code=$new_code"
            echo "new_has_formatx=$new_has_formatx"
            echo "old_url=$old_url"
            echo "old_code=$old_code"
            echo "old_has_formatx=$old_has_formatx"
          } >> "$GITHUB_OUTPUT"

          echo "New URL: HTTP $new_code, FormatX content: $new_has_formatx"
          echo "Old URL: HTTP $old_code, FormatX content: $old_has_formatx"

          if [ "$new_has_formatx" != "true" ]; then
            exit 1
          fi

      - name: Publish verification result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
          NEW_URL: ${{ steps.check.outputs.new_url }}
          NEW_CODE: ${{ steps.check.outputs.new_code }}
          NEW_HAS_FORMATX: ${{ steps.check.outputs.new_has_formatx }}
          OLD_URL: ${{ steps.check.outputs.old_url }}
          OLD_CODE: ${{ steps.check.outputs.old_code }}
          OLD_HAS_FORMATX: ${{ steps.check.outputs.old_has_formatx }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 - <<'PY' > /tmp/issue.json
          import json, os

          success = os.environ.get('JOB_STATUS') == 'success'
          title = 'FormatX branded URL verified' if success else 'FormatX branded URL verification failed'
          body = '\n'.join([
              'The branded Worker URL verification has completed.',
              '',
              f"- New URL: {os.environ.get('NEW_URL')}",
              f"- New URL HTTP status: `{os.environ.get('NEW_CODE') or 'unavailable'}`",
              f"- New URL contains FormatX: `{os.environ.get('NEW_HAS_FORMATX') or 'false'}`",
              f"- Previous URL: {os.environ.get('OLD_URL')}",
              f"- Previous URL HTTP status: `{os.environ.get('OLD_CODE') or 'unavailable'}`",
              f"- Previous URL contains FormatX: `{os.environ.get('OLD_HAS_FORMATX') or 'false'}`",
              '',
              f"Workflow run: {os.environ.get('RUN_URL')}",
          ])
          print(json.dumps({'title': title, 'body': body}, ensure_ascii=False))
          PY

          curl --fail-with-body --silent --show-error \
            --request POST \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/issue.json
