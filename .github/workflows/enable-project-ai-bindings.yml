name: Enable FormatX Project AI bindings

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/enable-project-ai-bindings.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-wrangler:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Add Workers AI and rate-limit bindings
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path('billing-worker/wrangler.jsonc')
          data = json.loads(path.read_text(encoding='utf-8'))
          data['ai'] = {'binding': 'AI'}
          data['ratelimits'] = [{
              'name': 'PROJECT_AI_RATE_LIMIT',
              'namespace_id': '420701',
              'simple': {'limit': 12, 'period': 60},
          }]
          path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY

      - name: Commit binding configuration
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- billing-worker/wrangler.jsonc; then
            echo "Bindings already configured."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
          git add billing-worker/wrangler.jsonc
          git commit -m "Enable Workers AI binding for bilingual Project AI"
          git pull --rebase origin master
          git push origin HEAD:master
