name: Bilingual coverage report

on:
  pull_request:
    paths:
      - "docs/**"
      - "tools/validate-site-i18n.py"
      - ".github/workflows/i18n-audit.yml"
  push:
    branches:
      - master
    paths:
      - "docs/**"
      - "tools/validate-site-i18n.py"
      - ".github/workflows/i18n-audit.yml"

permissions:
  contents: read

concurrency:
  group: bilingual-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Generate full bilingual audit report
        id: audit
        shell: bash
        run: |
          set -o pipefail
          python3 tools/validate-site-i18n.py 2>&1 | tee i18n-audit.txt

      - name: Upload bilingual audit report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: bilingual-audit-report
          path: i18n-audit.txt
          retention-days: 30
