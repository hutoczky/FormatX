name: One-time Android WebView cache fix

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - ".github/workflows/one-time-android-webview-cache-fix.yml"

permissions:
  contents: write

jobs:
  fix-build-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.5.0"

      - name: Install Android SDK
        shell: bash
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          SDKMANAGER="$(find "$SDK_ROOT/cmdline-tools" -type f -name sdkmanager | sort -V | tail -n 1)"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0"

      - name: Apply WebView cache fix and bump version
        shell: python
        run: |
          from pathlib import Path

          main = Path('android-app/app/src/main/java/hu/formatx/suite/MainActivity.java')
          text = main.read_text()
          text = text.replace('FormatXAndroid/1.0.3', 'FormatXAndroid/1.0.4')
          text = text.replace('appVersion", "1.0.3"', 'appVersion", "1.0.4"')
          text = text.replace('settings.setCacheMode(WebSettings.LOAD_DEFAULT);', 'settings.setCacheMode(WebSettings.LOAD_NO_CACHE);')
          marker = '        configureWebView();\n        configureBackNavigation();'
          replacement = '''        configureWebView();
        webView.clearCache(true);
        webView.clearHistory();
        android.webkit.WebStorage.getInstance().deleteAllData();
        configureBackNavigation();'''
          if marker not in text:
              raise SystemExit('MainActivity insertion point not found')
          text = text.replace(marker, replacement, 1)
          text = text.replace('.appendQueryParameter("appVersion", "1.0.4")', '.appendQueryParameter("appVersion", "1.0.4")\n                .appendQueryParameter("cacheBust", "104")')
          main.write_text(text)

          gradle = Path('android-app/app/build.gradle.kts')
          g = gradle.read_text().replace('versionCode = 5', 'versionCode = 6').replace('versionName = "1.0.3"', 'versionName = "1.0.4"')
          gradle.write_text(g)

      - name: Build APK
        shell: bash
        run: |
          set -euo pipefail
          gradle --no-daemon --stacktrace --project-dir android-app :app:assembleDebug
          APK=android-app/app/build/outputs/apk/debug/app-debug.apk
          test -f "$APK"
          unzip -t "$APK" >/dev/null
          cp "$APK" docs/scifi-ui/downloads/FormatX-Suite-Pro-Android.apk
          cp "$APK" docs/scifi-ui/downloads/FormatX-Suite-Pro-Android-1.0.4.apk
          SHA="$(sha256sum "$APK" | awk '{print $1}')"
          python - "$SHA" <<'PY'
          import json, sys
          from pathlib import Path
          p = Path('docs/scifi-ui/android-update.json')
          d = json.loads(p.read_text())
          d.update({
              'versionCode': 6,
              'versionName': '1.0.4',
              'apkUrl': 'https://hutoczky.github.io/FormatX/scifi-ui/downloads/FormatX-Suite-Pro-Android.apk',
              'sha256': sys.argv[1],
              'mandatory': False,
              'notes': 'WebView gyorsítótár kényszerített törlése, cache nélküli oldalbetöltés és a helyes FormatX 2041 felület.'
          })
          p.write_text(json.dumps(d, ensure_ascii=False, indent=2) + '\n')
          PY
          echo "$SHA  docs/scifi-ui/downloads/FormatX-Suite-Pro-Android.apk" > docs/scifi-ui/downloads/FormatX-Suite-Pro-Android.apk.sha256

      - name: Commit generated APK and source fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android-app/app/src/main/java/hu/formatx/suite/MainActivity.java \
                  android-app/app/build.gradle.kts \
                  docs/scifi-ui/android-update.json \
                  docs/scifi-ui/downloads/FormatX-Suite-Pro-Android.apk \
                  docs/scifi-ui/downloads/FormatX-Suite-Pro-Android-1.0.4.apk \
                  docs/scifi-ui/downloads/FormatX-Suite-Pro-Android.apk.sha256
          git commit -m "Fix stale Android WebView page and publish 1.0.4"
          git push origin master
