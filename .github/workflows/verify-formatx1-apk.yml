name: Verify Android APK on current Cloudflare site

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/verify-formatx1-apk.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      URL: https://formatx1.formatx.workers.dev/scifi-ui/downloads/FormatX-Suite-Pro-Android.apk
      EXPECTED_SHA256: fd47350080a9d589e27b4a092e5f32142a73d664c8bfc1f320a3ce7d5a2176d4
    steps:
      - name: Verify current Cloudflare download
        id: check
        shell: bash
        run: |
          set -uo pipefail
          ok=false
          code=000
          size=0
          sha=""
          for attempt in 1 2 3 4 5 6; do
            rm -f /tmp/formatx.apk
            code="$(curl --location --silent --show-error --max-time 45 --output /tmp/formatx.apk --write-out '%{http_code}' "$URL" || true)"
            if [ "$code" = "200" ] && [ -s /tmp/formatx.apk ]; then
              size="$(stat -c '%s' /tmp/formatx.apk)"
              sha="$(sha256sum /tmp/formatx.apk | cut -d' ' -f1)"
              magic="$(od -An -tx1 -N4 /tmp/formatx.apk | tr -d ' \n')"
              if [ "$size" -gt 800000 ] && [ "$sha" = "$EXPECTED_SHA256" ] && [ "$magic" = "504b0304" ]; then
                ok=true
                break
              fi
            fi
            sleep 15
          done
          echo "ok=$ok" >> "$GITHUB_OUTPUT"
          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "size=$size" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          [ "$ok" = "true" ]

      - name: Publish result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          OK: ${{ steps.check.outputs.ok }}
          CODE: ${{ steps.check.outputs.code }}
          SIZE: ${{ steps.check.outputs.size }}
          SHA: ${{ steps.check.outputs.sha }}
        run: |
          gh issue create --repo "$GITHUB_REPOSITORY" \
            --title "FormatX current Cloudflare APK verification" \
            --body "- URL: ${URL}
- OK: \`${OK}\`
- HTTP: \`${CODE}\`
- Size: \`${SIZE}\`
- SHA256: \`${SHA}\`
- Expected: \`${EXPECTED_SHA256}\`"
