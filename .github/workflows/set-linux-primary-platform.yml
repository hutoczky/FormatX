name: Set Linux as primary FormatX platform

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/set-linux-primary-platform.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-platform-positioning:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Update project and AI platform wording
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          replacements = {
              'billing-worker/src/project-ai.js': [
                  ('- The central technician application is Windows-focused.', '- Linux, especially Bazzite-compatible Linux environments, is the primary supported platform.'),
                  ('- A web interface and Android client provide supplementary access.', '- The web interface and Android client provide supplementary access across supported platforms.'),
                  ('- Linux/Bazzite and macOS are part of the wider cross-platform direction and integration workflow.', '- Windows and macOS are additionally supported alongside the primary Linux/Bazzite platform.'),
                  ('A központi technikusi alkalmazás Windows-központú. A webes felület és az Android kliens kiegészítő hozzáférést ad; a Linux/Bazzite és macOS a többplatformos integrációs irány része.', 'A FormatX elsődleges támogatott platformja a Linux, különösen a Bazzite-kompatibilis környezet. A Windows és a macOS kiegészítő támogatást kap, a webes felület és az Android kliens pedig többplatformos hozzáférést biztosít.'),
                  ('The central technician application is Windows-focused. The web interface and Android client provide supplementary access; Linux/Bazzite and macOS are part of the cross-platform integration direction.', 'Linux, especially Bazzite-compatible environments, is the primary supported platform. Windows and macOS receive additional support, while the web interface and Android client provide cross-platform access.'),
              ],
              'docs/scifi-ui/index.html': [
                  ('Windows technikusi mag', 'Linux / Bazzite technikusi mag'),
                  ('A projekt központi technikusi alkalmazása Windows-központú, mellette webes felület és Android-kliens biztosít kiegészítő hozzáférést. A Linux / Bazzite és macOS irányú integráció a többplatformos munkafolyamat része.', 'A projekt elsődleges technikusi platformja a Linux, különösen a Bazzite-kompatibilis környezet. A Windows és a macOS kiegészítő támogatást kap, a webes felület és az Android-kliens pedig többplatformos hozzáférést biztosít.'),
                  ('Windows, Linux / Bazzite és macOS támogatás.', 'Elsődleges Linux / Bazzite támogatás, valamint Windows- és macOS-kompatibilitás.'),
                  ('WIN · LNX · MAC', 'LNX · WIN · MAC'),
                  ('<b>WINDOWS</b><b>LINUX / BAZZITE</b><b>macOS</b>', '<b>LINUX / BAZZITE · PRIMARY</b><b>WINDOWS</b><b>macOS</b>'),
              ],
              'docs/scifi-ui/scripts/landing.js': [
                  ('Windows, Linux / Bazzite és macOS támogatás.', 'Elsődleges Linux / Bazzite támogatás, valamint Windows- és macOS-kompatibilitás.'),
                  ('Windows, Linux / Bazzite and macOS support.', 'Primary Linux / Bazzite support with additional Windows and macOS compatibility.'),
              ],
              'docs/scifi-ui/scripts/i18n.js': [
                  ('Windows technikusi mag', 'Linux / Bazzite technikusi mag'),
                  ('Windows technician core', 'Linux / Bazzite technician core'),
              ],
              'docs/scifi-ui/scripts/site.js': [
                  ('Windows technikusi mag', 'Linux / Bazzite technikusi mag'),
                  ('Windows technician core', 'Linux / Bazzite technician core'),
              ],
          }

          changed = []
          for filename, pairs in replacements.items():
              path = Path(filename)
              if not path.exists():
                  continue
              text = path.read_text(encoding='utf-8')
              original = text
              for old, new in pairs:
                  text = text.replace(old, new)
              if text != original:
                  path.write_text(text, encoding='utf-8')
                  changed.append(filename)

          required = {'billing-worker/src/project-ai.js', 'docs/scifi-ui/index.html'}
          if not required.issubset(set(changed)):
              missing = required - set(changed)
              raise SystemExit(f'Required platform text was not updated: {sorted(missing)}')

          print('Updated files:')
          for filename in changed:
              print('-', filename)
          PY

      - name: Commit corrected platform positioning
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
          git add billing-worker/src/project-ai.js docs/scifi-ui
          git commit -m "Set Linux and Bazzite as the primary FormatX platform"
          git pull --rebase origin master
          git push origin HEAD:master
