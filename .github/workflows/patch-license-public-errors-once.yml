name: Apply reviewed license public-error mapping once

on:
  push:
    branches:
      - feature/website-license-center
    paths:
      - '.github/workflows/patch-license-public-errors-once.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: feature/website-license-center
          fetch-depth: 0
      - name: Map expected public errors to their HTTP status
        shell: python
        run: |
          from pathlib import Path

          path = Path('billing-worker/src/license-center.js')
          text = path.read_text(encoding='utf-8')
          old = '''  } catch (error) {
              console.error('FormatX license center error', error instanceof Error ? error.message : String(error));
              return json({ ok: false, error: 'internal_error' }, 500);
            }
          }
          '''
          new = '''  } catch (error) {
              if (error instanceof PublicError) {
                return json({ ok: false, valid: false, error: error.code }, error.status);
              }
              console.error('FormatX license center error', error instanceof Error ? error.message : String(error));
              return json({ ok: false, error: 'internal_error' }, 500);
            }
          }
          '''
          if old not in text:
              raise SystemExit('Expected catch block not found; refusing an unsafe patch.')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
      - name: Commit patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add billing-worker/src/license-center.js
          git commit -m 'fix: return precise public license API errors'
          git push origin HEAD:feature/website-license-center
