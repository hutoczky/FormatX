name: Website License Center CI

on:
  pull_request:
    paths:
      - 'billing-worker/src/license-center.js'
      - 'billing-worker/src/production-with-license.js'
      - 'billing-worker/license-migrations/**'
      - 'billing-worker/scripts/deploy-license-center-live.sh'
      - 'billing-worker/test/license-center*.js'
      - 'billing-worker/vitest.license-workers.config.js'
      - 'billing-worker/wrangler.license-test.jsonc'
      - 'billing-worker/package.json'
      - 'docs/fx-owner-license/**'
      - 'billing-worker/wrangler.jsonc'
      - '.github/workflows/license-center-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: billing-worker
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: billing-worker/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: JavaScript syntax
        run: |
          node --check src/license-center.js
          node --check src/production-with-license.js
          node --check ../docs/fx-owner-license/app.js
          node --check vitest.license-workers.config.js
          node --check test/license-center-e2e.spec.js
          node --check test/license-center.setup.js
      - name: Shell syntax
        run: bash -n scripts/deploy-license-center-live.sh
      - name: Safe Worker, secret and trusted-session configuration
        run: |
          python3 - <<'PY'
          from pathlib import Path
          script = Path('scripts/deploy-license-center-live.sh').read_text(encoding='utf-8')
          first_deploy = script.index('npx wrangler deploy --config "$TMP_CONFIG"')
          first_secret = script.index('npx wrangler secret put')
          assert first_deploy < first_secret, 'The Worker must be deployed before wrangler secret put.'
          assert 'FORMATX_ACCESS_SESSION_DURATION:-720h' in script, 'Trusted browser session must default to 30 days.'
          assert script.count('"session_duration":') >= 3, 'Organization, application and policy durations must be configured.'
          PY
      - name: Database and repository secret safety
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          migration = Path('license-migrations/0001_license_center.sql').read_text(encoding='utf-8')
          assert 'CREATE TABLE IF NOT EXISTS licenses' in migration
          assert 'device_hash TEXT NOT NULL' in migration

          patterns = {
              'OpenAI key': re.compile(r'sk-[A-Za-z0-9_-]{20,}'),
              'Cloudflare token assignment': re.compile(r'CLOUDFLARE_API_TOKEN\s*=\s*[A-Za-z0-9_-]{20,}'),
              'license pepper assignment': re.compile(r'LICENSE_PEPPER\s*=\s*[A-Za-z0-9_+/=-]{20,}'),
              'admin password record': re.compile(r'ADMIN_PASSWORD_RECORD\s*=\s*v1:[0-9]+:[A-Za-z0-9_-]+:[A-Za-z0-9_-]+'),
          }
          roots = [Path('src'), Path('scripts'), Path('../docs'), Path('license-migrations')]
          files = [Path('wrangler.jsonc')]
          for root in roots:
              files.extend(path for path in root.rglob('*') if path.is_file())

          findings = []
          for path in files:
              try:
                  text = path.read_text(encoding='utf-8')
              except UnicodeDecodeError:
                  continue
              for label, pattern in patterns.items():
                  if pattern.search(text):
                      findings.append(f'{label}: {path}')
          assert not findings, 'Possible committed secrets:\n' + '\n'.join(findings)
          PY
      - name: Full local D1 license lifecycle tests
        id: tests
        shell: bash
        run: |
          set +e
          npm run test:license 2>&1 | tee license-center-tests.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: license-center-test-log
          path: billing-worker/license-center-tests.log
          if-no-files-found: error
      - name: Fail when tests failed
        if: steps.tests.outputs.status != '0'
        run: exit 1
      - name: Production bundle dry-run
        run: npx wrangler deploy --dry-run --outdir ../.wrangler-license-ci
