name: Fix Android download host

on:
  push:
    branches: [agent/fix-android-black-screen]
    paths:
      - '.github/workflows/fix-android-download-host.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-android-black-screen
      - name: Pin Android download to the production Worker
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('docs/scifi-ui/index.html')
          text = path.read_text(encoding='utf-8')
          old = 'href="/download/android"'
          new = 'href="https://formatxsuite.formatx.workers.dev/download/android"'
          if old not in text and new not in text:
              raise SystemExit('Android download marker not found')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
      - name: Verify patched link
        run: grep -F 'https://formatxsuite.formatx.workers.dev/download/android' docs/scifi-ui/index.html
      - name: Commit patch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/scifi-ui/index.html
          git commit -m 'Pin Android download to production Worker'
          git push origin HEAD:agent/fix-android-black-screen
