name: Lighthouse CI

on:
  pull_request:
    branches: [master]
    paths:
      - 'docs/scifi-ui/**'
  push:
    branches: [master]
    paths:
      - 'docs/scifi-ui/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install -g @lhci/cli@0.13.x

      - name: Run Lighthouse CI
        id: lighthouse
        run: lhci autorun --rc=lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: lighthouse-results
          path: .lighthouseci/
          retention-days: 30

      - name: Summarize Lighthouse results
        if: always()
        run: |
          {
            echo "## Lighthouse CI Results"
            echo
            echo "Production: https://www.formatxsuite.com/"
            echo
            echo "### Thresholds"
            echo "- LCP < 2.5s"
            echo "- CLS < 0.10"
            echo "- TTFB < 600ms"
            echo
            echo "The production site is deployed as one Cloudflare Worker with Static Assets."
          } >> "$GITHUB_STEP_SUMMARY"
