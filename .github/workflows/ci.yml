name: Lighthouse CI

on:
  pull_request:
    branches: [ master, main ]
    paths:
      - 'docs/scifi-ui/**'
  push:
    branches: [ master, main ]
    paths:
      - 'docs/scifi-ui/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install -g @lhci/cli@0.13.x

      - name: Run Lighthouse CI
        id: lighthouse
        run: |
          lhci autorun --rc=lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-results
          path: .lighthouseci/
          retention-days: 30

      - name: Summarize Lighthouse results
        if: github.event_name == 'pull_request'
        run: |
          {
            echo "## Lighthouse CI Results"
            echo
            echo "All Lighthouse checks passed."
            echo
            echo "### Thresholds"
            echo "- LCP < 2.5s"
            echo "- CLS < 0.10"
            echo "- TTFB < 600ms"
            echo
            echo "GitHub Pages: https://hutoczky.github.io/FormatX/scifi-ui/"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Echo Pages config on merge
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          echo "================================================"
          echo "GitHub Pages Configuration"
          echo "================================================"
          echo "Source: master branch → /docs folder"
          echo "URL: https://hutoczky.github.io/FormatX/scifi-ui/"
          echo "Root redirect: /docs/index.html → scifi-ui/"
          echo "================================================"
