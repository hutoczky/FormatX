name: Optimize visible language loader

on:
  push:
    branches:
      - agent/fix-visible-language-switch
    paths:
      - "tools/optimize-language-loader.py"
      - ".github/workflows/optimize-language-loader.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-visible-language-switch
          fetch-depth: 0

      - name: Optimize language loading
        run: python3 tools/optimize-language-loader.py

      - name: Commit optimized loader
        run: |
          if git diff --quiet; then
            echo "Language loader already optimized."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/scifi-ui/*.html docs/scifi-ui/scripts/site.js
          git commit -m "Optimize visible language switch loading"
          git push origin HEAD:agent/fix-visible-language-switch
