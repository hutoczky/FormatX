name: Apply reviewed license deployment script fixes once

on:
  push:
    branches:
      - feature/website-license-center
    paths:
      - '.github/workflows/patch-license-deploy-script-once.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: feature/website-license-center
          fetch-depth: 0
      - name: Use isolated tests and complete Zero Trust organization defaults
        shell: python
        run: |
          from pathlib import Path

          path = Path('billing-worker/scripts/deploy-license-center-live.sh')
          text = path.read_text(encoding='utf-8')

          old_test = "npm test -- --run"
          new_test = "npm run test:license"
          if old_test not in text:
              raise SystemExit('Expected test command not found.')
          text = text.replace(old_test, new_test, 1)

          old_org = '''{"name":"FormatX","auth_domain":sys.argv[1],"auto_redirect_to_identity":False,"deny_unmatched_requests":False}'''
          new_org = '''{"name":"FormatX","auth_domain":sys.argv[1],"auto_redirect_to_identity":False,"deny_unmatched_requests":False,"session_duration":"24h","warp_auth_session_duration":"24h","user_seat_expiration_inactive_time":"730h"}'''
          if old_org not in text:
              raise SystemExit('Expected organization body not found.')
          text = text.replace(old_org, new_org, 1)

          path.write_text(text, encoding='utf-8')
      - name: Commit patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add billing-worker/scripts/deploy-license-center-live.sh
          git commit -m 'fix: harden live license deployment prerequisites'
          git push origin HEAD:feature/website-license-center
