name: Apply final i18n pair

on:
  push:
    branches:
      - agent/bilingual-hu-en-site
    paths:
      - "tools/add-final-i18n-pair.py"
      - ".github/workflows/apply-final-i18n-pair.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/bilingual-hu-en-site
          fetch-depth: 0

      - name: Add final translation
        run: python3 tools/add-final-i18n-pair.py

      - name: Commit final translation
        run: |
          if git diff --quiet; then
            echo "Final translation already present."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/scifi-ui/scripts/i18n.js
          git commit -m "Add final bilingual label"
          git push origin HEAD:agent/bilingual-hu-en-site
