name: Fix Android to use working FormatX site

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/fix-android-use-working-site.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.5.0"

      - name: Install Android SDK
        shell: bash
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          SDKMANAGER="$(find "$SDK_ROOT/cmdline-tools" -type f -name sdkmanager | sort -V | tail -n 1)"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0"

      - name: Point Android app to verified site and bump version
        shell: bash
        run: |
          set -euo pipefail
          MAIN="android-app/app/src/main/java/hu/formatx/suite/MainActivity.java"
          BUILD="android-app/app/build.gradle.kts"

          sed -i 's/private static final String PRIMARY_HOST = ".*";/private static final String PRIMARY_HOST = "hutoczky.github.io";/' "$MAIN"
          sed -i 's#private static final String PRIMARY_PATH = ".*";#private static final String PRIMARY_PATH = "/FormatX/scifi-ui/index.html";#' "$MAIN"
          sed -i 's/FormatXAndroid\/1\.0\.3/FormatXAndroid\/1.0.4/g' "$MAIN"
          sed -i 's/appVersion", "1\.0\.3"/appVersion", "1.0.4"/g' "$MAIN"
          sed -i 's/versionCode = 5/versionCode = 6/' "$BUILD"
          sed -i 's/versionName = "1\.0\.3"/versionName = "1.0.4"/' "$BUILD"

          grep -F 'PRIMARY_HOST = "hutoczky.github.io"' "$MAIN"
          grep -F 'PRIMARY_PATH = "/FormatX/scifi-ui/index.html"' "$MAIN"
          grep -F 'versionName = "1.0.4"' "$BUILD"

      - name: Build APK
        shell: bash
        run: |
          set -euo pipefail
          gradle --no-daemon --stacktrace --project-dir android-app :app:assembleDebug

      - name: Publish APK and update manifest
        shell: bash
        run: |
          set -euo pipefail
          APK="docs/scifi-ui/downloads/FormatX-Suite-Pro-Android.apk"
          cp android-app/app/build/outputs/apk/debug/app-debug.apk "$APK"
          cp "$APK" docs/scifi-ui/downloads/FormatX-Suite-Pro-Android-1.0.4.apk
          SHA="$(sha256sum "$APK" | awk '{print $1}')"
          cat > docs/scifi-ui/android-update.json <<EOF
          {
            "versionCode": 6,
            "versionName": "1.0.4",
            "apkUrl": "https://hutoczky.github.io/FormatX/scifi-ui/downloads/FormatX-Suite-Pro-Android.apk",
            "sha256": "$SHA",
            "mandatory": false,
            "notes": "Az Android alkalmazás közvetlenül a működő FormatX Suite Pro webfelületet nyitja meg."
          }
          EOF
          unzip -t "$APK"
          sha256sum "$APK"

      - name: Commit fixed APK
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/fix-android-use-working-site.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android-app docs/scifi-ui/android-update.json docs/scifi-ui/downloads .github/workflows/fix-android-use-working-site.yml
          git commit -m "Fix Android app to open working FormatX site and publish 1.0.4"
          git push
