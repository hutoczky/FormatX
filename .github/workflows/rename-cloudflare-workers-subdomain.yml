name: Rename Cloudflare workers.dev subdomain

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/rename-cloudflare-workers-subdomain.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  rename:
    name: Remove personal name from Worker URL
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CLOUDFLARE_ACCOUNT_ID: ffd7d28ea7c6a510549dc9363619c8c5
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      WORKER_NAME: formatxsuite

    steps:
      - name: Verify Cloudflare authorization
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN repository secret is missing." >&2
            exit 1
          fi

      - name: Read current workers.dev account subdomain
        id: current
        run: |
          set -euo pipefail
          response="$(curl --fail-with-body --silent --show-error \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/subdomain" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json")"
          current="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["result"]["subdomain"])' <<<"$response")"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "Current account subdomain: $current"

      - name: Select and apply a FormatX account subdomain
        id: rename
        run: |
          set -euo pipefail

          current="${{ steps.current.outputs.current }}"
          if [[ "$current" != "hutoczky" && "$current" == formatx* ]]; then
            echo "selected=$current" >> "$GITHUB_OUTPUT"
            echo "Already using a branded subdomain: $current"
            exit 0
          fi

          candidates=(formatx formatx2041 formatxsuite2041 formatx-platform)
          selected=""

          for candidate in "${candidates[@]}"; do
            body="$(printf '{"subdomain":"%s"}' "$candidate")"
            response_file="$(mktemp)"
            http_code="$(curl --silent --show-error \
              --output "$response_file" \
              --write-out '%{http_code}' \
              --request PUT \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/subdomain" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "$body")"

            if [ "$http_code" = "200" ] && python3 -c 'import json,sys; assert json.load(open(sys.argv[1]))["success"] is True' "$response_file"; then
              selected="$candidate"
              rm -f "$response_file"
              break
            fi

            echo "Candidate unavailable or rejected: $candidate (HTTP $http_code)"
            cat "$response_file"
            rm -f "$response_file"
          done

          if [ -z "$selected" ]; then
            echo "No branded workers.dev account subdomain could be assigned." >&2
            exit 1
          fi

          echo "selected=$selected" >> "$GITHUB_OUTPUT"
          echo "Selected account subdomain: $selected"

      - name: Verify Cloudflare accepted the new subdomain
        run: |
          set -euo pipefail
          expected="${{ steps.rename.outputs.selected }}"
          response="$(curl --fail-with-body --silent --show-error \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/subdomain" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json")"
          actual="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["result"]["subdomain"])' <<<"$response")"
          test "$actual" = "$expected"
          echo "Cloudflare account subdomain verified: $actual"

      - name: Verify the branded FormatX URL
        run: |
          set -euo pipefail
          subdomain="${{ steps.rename.outputs.selected }}"
          url="https://${WORKER_NAME}.${subdomain}.workers.dev/"

          for attempt in 1 2 3 4 5 6; do
            code="$(curl --location --silent --output /tmp/formatx.html --write-out '%{http_code}' "$url" || true)"
            if [ "$code" = "200" ] && grep -qi "FormatX" /tmp/formatx.html; then
              echo "FormatX is live at $url"
              {
                echo "## Branded FormatX URL"
                echo
                echo "$url"
                echo
                echo "Previous account subdomain: ${{ steps.current.outputs.current }}"
              } >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            echo "Attempt $attempt: HTTP $code; waiting for Cloudflare propagation..."
            sleep 10
          done

          echo "Cloudflare accepted the rename, but the branded Worker URL has not propagated yet: $url" >&2
          exit 1

      - name: Publish rename result as a GitHub issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
          CURRENT_SUBDOMAIN: ${{ steps.current.outputs.current }}
          SELECTED_SUBDOMAIN: ${{ steps.rename.outputs.selected }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          if [ "$JOB_STATUS" = "success" ]; then
            title="Cloudflare URL rename succeeded"
            public_url="https://${WORKER_NAME}.${SELECTED_SUBDOMAIN}.workers.dev/"
            summary="The account workers.dev subdomain was changed successfully and the FormatX page responded at ${public_url}."
          elif [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            title="Cloudflare URL rename blocked: API token missing"
            public_url=""
            summary="The repository secret CLOUDFLARE_API_TOKEN is missing, so GitHub could not call the Cloudflare account API. No Cloudflare setting was changed."
          else
            title="Cloudflare URL rename failed"
            public_url=""
            summary="Cloudflare authorization was available, but the rename or URL verification failed. Review the linked workflow run."
          fi

          python3 - "$title" "$summary" "$CURRENT_SUBDOMAIN" "$SELECTED_SUBDOMAIN" "$public_url" "$RUN_URL" > /tmp/issue.json <<'PY'
          import json, sys
          title, summary, current, selected, public_url, run_url = sys.argv[1:]
          lines = [
              summary,
              "",
              f"- Previous account subdomain: `{current or 'unavailable'}`",
              f"- Selected account subdomain: `{selected or 'none'}`",
          ]
          if public_url:
              lines.append(f"- Branded FormatX URL: {public_url}")
          lines.extend(["", f"Workflow run: {run_url}"])
          print(json.dumps({"title": title, "body": "\n".join(lines)}, ensure_ascii=False))
          PY

          curl --fail-with-body --silent --show-error \
            --request POST \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/issue.json
