name: Repair formatx1 website and publish Android 1.0.4

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/fix-formatx1-site-and-publish-android.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repair-formatx1-and-android
  cancel-in-progress: false

jobs:
  repair-build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 9.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.5.0"

      - name: Install Android SDK components
        shell: bash
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          test -n "$SDK_ROOT"
          SDKMANAGER="$(find "$SDK_ROOT/cmdline-tools" -type f -name sdkmanager | sort -V | tail -n 1)"
          test -x "$SDKMANAGER"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0"

      - name: Harden Android landing page loading and bump version
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          main = Path('android-app/app/src/main/java/hu/formatx/suite/MainActivity.java')
          text = main.read_text(encoding='utf-8')

          text = text.replace('FormatXAndroid/1.0.3', 'FormatXAndroid/1.0.4')
          text = text.replace('appVersion", "1.0.3"', 'appVersion", "1.0.4"')
          text = text.replace('settings.setCacheMode(WebSettings.LOAD_DEFAULT);',
                              'settings.setCacheMode(WebSettings.LOAD_NO_CACHE);')

          if 'webView.clearCache(true);' not in text:
              text = text.replace(
                  '        configureWebView();\n        configureBackNavigation();',
                  '        configureWebView();\n        webView.clearCache(true);\n        configureBackNavigation();',
                  1,
              )

          if '.appendQueryParameter("siteRevision", "20260719-2")' not in text:
              text = text.replace(
                  '                .appendQueryParameter("appVersion", "1.0.4")\n                .build();',
                  '                .appendQueryParameter("appVersion", "1.0.4")\n'
                  '                .appendQueryParameter("siteRevision", "20260719-2")\n'
                  '                .build();',
                  1,
              )

          old_commit = '''        @Override
          public void onPageCommitVisible(WebView view, String url) {
              if (isCurrentRequest(Uri.parse(url))) showPage();
          }

          @Override
          public void onPageFinished(WebView view, String url) {
              if (isCurrentRequest(Uri.parse(url)) && view.getProgress() >= 100) showPage();
          }'''

          new_commit = '''        @Override
          public void onPageCommitVisible(WebView view, String url) {
              // A panel csak a modern FormatX oldal ellenőrzése után tűnik el.
          }

          @Override
          public void onPageFinished(WebView view, String url) {
              Uri uri = Uri.parse(url);
              if (!isCurrentRequest(uri) || view.getProgress() < 100) return;

              String homePath = currentHomeUri == null || currentHomeUri.getPath() == null
                      ? "" : currentHomeUri.getPath();
              String loadedPath = uri.getPath() == null ? "" : uri.getPath();
              if (!homePath.equals(loadedPath)) {
                  showPage();
                  return;
              }

              verifyLandingPage(view);
          }'''

          if old_commit in text:
              text = text.replace(old_commit, new_commit, 1)
          elif 'verifyLandingPage(view);' not in text:
              raise SystemExit('Nem található a lecserélendő WebView onPageFinished blokk.')

          if 'private void verifyLandingPage(WebView view)' not in text:
              marker = '    private void showPage() {'
              method = '''    private void verifyLandingPage(WebView view) {
              view.evaluateJavascript(
                      "(function(){return !!(document.body && document.body.classList.contains('reference-commerce'));})()",
                      result -> {
                          if ("true".equals(result)) {
                              showPage();
                          } else if (!usingFallback) {
                              loadFallback();
                          } else {
                              showError("A betöltött oldal nem a FormatX Suite Pro felülete.");
                          }
                      }
              );
          }

          '''
              text = text.replace(marker, method + marker, 1)

          required = [
              'private static final String PRIMARY_HOST = "formatx1.formatx.workers.dev";',
              'private static final String PRIMARY_PATH = "/scifi-ui/";',
              'settings.setCacheMode(WebSettings.LOAD_NO_CACHE);',
              'webView.clearCache(true);',
              'verifyLandingPage(view);',
              'siteRevision", "20260719-2"',
              'FormatXAndroid/1.0.4',
          ]
          for item in required:
              if item not in text:
                  raise SystemExit(f'Hiányzó Android javítás: {item}')

          main.write_text(text, encoding='utf-8')

          gradle = Path('android-app/app/build.gradle.kts')
          build = gradle.read_text(encoding='utf-8')
          build = build.replace('versionCode = 5', 'versionCode = 6')
          build = build.replace('versionName = "1.0.3"', 'versionName = "1.0.4"')
          if 'versionCode = 6' not in build or 'versionName = "1.0.4"' not in build:
              raise SystemExit('Az Android verzió emelése sikertelen.')
          gradle.write_text(build, encoding='utf-8')
          PY

      - name: Build and lint Android 1.0.4
        shell: bash
        run: |
          set -euo pipefail
          gradle --no-daemon --stacktrace --warning-mode all --project-dir android-app \
            :app:assembleDebug :app:lintDebug

      - name: Publish Android 1.0.4 website assets
        shell: bash
        run: |
          set -euo pipefail
          APK="android-app/app/build/outputs/apk/debug/app-debug.apk"
          DEST="docs/scifi-ui/downloads/FormatX-Suite-Pro-Android.apk"
          VERSIONED="docs/scifi-ui/downloads/FormatX-Suite-Pro-Android-1.0.4.apk"
          MANIFEST="docs/scifi-ui/downloads/android-update.json"

          test -s "$APK"
          unzip -t "$APK" >/dev/null
          test "$(stat -c '%s' "$APK")" -gt 800000

          cp "$APK" "$DEST"
          cp "$APK" "$VERSIONED"
          SHA256="$(sha256sum "$DEST" | cut -d' ' -f1)"
          printf '%s  %s\n' "$SHA256" "$DEST" > docs/scifi-ui/downloads/FormatX-Suite-Pro-Android.apk.sha256

          SHA256="$SHA256" python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path('docs/scifi-ui/downloads/android-update.json')
          data = json.loads(path.read_text(encoding='utf-8'))
          data.update({
              'versionCode': 6,
              'versionName': '1.0.4',
              'apkUrl': 'https://hutoczky.github.io/FormatX/scifi-ui/downloads/FormatX-Suite-Pro-Android.apk',
              'sha256': os.environ['SHA256'],
              'mandatory': False,
              'notes': 'Javított formatx1 webhelytelepítés, WebView gyorsítótár törlése és automatikus védelem a régi demooldal ellen.'
          })
          path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          worker = Path('billing-worker/src/production-entry.js')
          text = worker.read_text(encoding='utf-8').replace(
              'FormatX-Suite-Pro-Android-1.0.3.apk',
              'FormatX-Suite-Pro-Android-1.0.4.apk'
          )
          worker.write_text(text, encoding='utf-8')
          PY

          test "$(python3 -c "import json; print(json.load(open('$MANIFEST'))['sha256'])")" = "$SHA256"
          echo "FormatX Android 1.0.4 SHA256: $SHA256"

      - name: Deploy current FormatX site and API to formatx1 Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ffd7d28ea7c6a510549dc9363619c8c5
          workingDirectory: billing-worker
          command: deploy --name formatx1

      - name: Verify formatx1 serves the modern scifi-ui
        shell: bash
        run: |
          set -euo pipefail
          URL="https://formatx1.formatx.workers.dev/scifi-ui/?lang=hu&siteRevision=20260719-2"
          HTML="$(mktemp)"
          CSS="$(mktemp)"

          for attempt in $(seq 1 12); do
            if curl -fsSL --connect-timeout 10 --max-time 30 \
                -H 'Cache-Control: no-cache' "$URL" -o "$HTML" \
                && grep -Fq 'class="reference-commerce"' "$HTML" \
                && grep -Fq 'reference-commerce.css' "$HTML"; then
              break
            fi
            if [ "$attempt" -eq 12 ]; then
              echo 'A formatx1 Worker még nem a modern scifi-ui oldalt szolgálja ki.' >&2
              sed -n '1,80p' "$HTML" >&2 || true
              exit 1
            fi
            sleep 5
          done

          curl -fsSL --connect-timeout 10 --max-time 30 \
            -H 'Cache-Control: no-cache' \
            'https://formatx1.formatx.workers.dev/scifi-ui/styles/reference-commerce.css?v=20260718-reference-commerce-1' \
            -o "$CSS"
          test "$(stat -c '%s' "$CSS")" -gt 1000
          grep -Fq '.reference-commerce' "$CSS"

      - name: Commit repaired Worker, Android source and APK
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/fix-formatx1-site-and-publish-android.yml
          git add android-app docs/scifi-ui/downloads billing-worker/src/production-entry.js
          git commit -m "Repair formatx1 site and publish Android 1.0.4"
          git push origin HEAD:master
