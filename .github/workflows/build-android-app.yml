name: Build and publish FormatX Android APK

on:
  push:
    branches: [master]
    paths:
      - "android-app/**"
      - ".github/workflows/build-android-app.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: formatx-android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout current master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 9.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.5.0"

      - name: Install Android SDK
        shell: bash
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          test -n "$SDK_ROOT"
          SDKMANAGER="$(find "$SDK_ROOT/cmdline-tools" -type f -name sdkmanager | sort -V | tail -n 1)"
          test -x "$SDKMANAGER"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0"

      - name: Verify dual-site Android source
        shell: bash
        run: |
          set -euo pipefail
          MAIN="android-app/app/src/main/java/hu/formatx/suite/MainActivity.java"
          BUILD="android-app/app/build.gradle.kts"
          grep -F 'PRIMARY_HOST = "formatx1.formatx.workers.dev"' "$MAIN"
          grep -F 'PRIMARY_PATH = "/scifi-ui/"' "$MAIN"
          grep -F 'FALLBACK_HOST = "hutoczky.github.io"' "$MAIN"
          grep -F 'FALLBACK_PATH = "/FormatX/scifi-ui/"' "$MAIN"
          grep -F 'WebSettings.LOAD_NO_CACHE' "$MAIN"
          grep -F 'webView.clearCache(true)' "$MAIN"
          grep -F 'FormatXAndroid/1.0.5' "$MAIN"
          grep -F 'versionCode = 7' "$BUILD"
          grep -F 'versionName = "1.0.5"' "$BUILD"

      - name: Build and lint Android 1.0.5
        shell: bash
        run: |
          set -euo pipefail
          gradle --no-daemon --stacktrace --warning-mode all --project-dir android-app \
            :app:assembleDebug :app:lintDebug

      - name: Publish APK and metadata
        shell: bash
        run: |
          set -euo pipefail
          APK="android-app/app/build/outputs/apk/debug/app-debug.apk"
          DEST="docs/scifi-ui/downloads/FormatX-Suite-Pro-Android.apk"
          VERSIONED="docs/scifi-ui/downloads/FormatX-Suite-Pro-Android-1.0.5.apk"
          MANIFEST="docs/scifi-ui/downloads/android-update.json"

          test -s "$APK"
          unzip -t "$APK" >/dev/null
          test "$(stat -c '%s' "$APK")" -gt 800000
          cp "$APK" "$DEST"
          cp "$APK" "$VERSIONED"
          SHA256="$(sha256sum "$DEST" | awk '{print $1}')"
          printf '%s  %s\n' "$SHA256" "$DEST" > docs/scifi-ui/downloads/FormatX-Suite-Pro-Android.apk.sha256

          SHA256="$SHA256" python3 - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          manifest = Path('docs/scifi-ui/downloads/android-update.json')
          data = json.loads(manifest.read_text(encoding='utf-8'))
          data.update({
              'versionCode': 7,
              'versionName': '1.0.5',
              'apkUrl': 'https://hutoczky.github.io/FormatX/scifi-ui/downloads/FormatX-Suite-Pro-Android.apk',
              'sha256': os.environ['SHA256'],
              'mandatory': False,
              'notes': 'Elsődleges formatx1 Worker és automatikus GitHub Pages tartalék; teljes WebView cache-törlés.'
          })
          manifest.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          obsolete = Path('docs/scifi-ui/android-update.json')
          if obsolete.exists():
              obsolete.unlink()

          worker = Path('billing-worker/src/production-entry.js')
          if worker.exists():
              text = worker.read_text(encoding='utf-8')
              text = re.sub(
                  r'FormatX-Suite-Pro-Android-[0-9.]+\.apk',
                  'FormatX-Suite-Pro-Android-1.0.5.apk',
                  text,
              )
              worker.write_text(text, encoding='utf-8')
          PY

          test "$(python3 -c "import json; print(json.load(open('$MANIFEST'))['sha256'])")" = "$SHA256"
          echo "APK_SHA256=$SHA256" >> "$GITHUB_ENV"

      - name: Commit Android 1.0.5 APK
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
          git add docs/scifi-ui/downloads billing-worker/src/production-entry.js
          git add -A docs/scifi-ui/android-update.json
          git commit -m "Publish FormatX Android 1.0.5 with dual-site fallback"
          git pull --rebase origin master
          git push origin HEAD:master

      - name: Deploy current site and API to formatx1 Worker
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ffd7d28ea7c6a510549dc9363619c8c5
          workingDirectory: billing-worker
          command: deploy --name formatx1

      - name: Verify both FormatX sites
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          check_site() {
            local url="$1"
            local html
            html="$(mktemp)"
            curl -fsSL --connect-timeout 10 --max-time 30 \
              -H 'Cache-Control: no-cache' "$url" -o "$html"
            grep -Fq 'class="reference-commerce"' "$html"
            grep -Fq 'reference-commerce.css' "$html"
          }
          check_site 'https://formatx1.formatx.workers.dev/scifi-ui/?lang=hu&cacheBust=105'
          check_site 'https://hutoczky.github.io/FormatX/scifi-ui/?lang=hu&cacheBust=105'
