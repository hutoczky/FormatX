name: Build and publish FormatX Android APK

on:
  push:
    branches: [master]
    paths:
      - "android-app/**"
      - ".github/workflows/build-android-app.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: formatx-android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout current master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 9.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.5.0"

      - name: Install Android SDK
        shell: bash
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          test -n "$SDK_ROOT"
          SDKMANAGER="$(find "$SDK_ROOT/cmdline-tools" -type f -name sdkmanager | sort -V | tail -n 1)"
          test -x "$SDKMANAGER"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0"

      - name: Prepare Android 1.0.6 source
        shell: python
        run: |
          import re
          from pathlib import Path

          main = Path('android-app/app/src/main/java/hu/formatx/suite/MainActivity.java')
          text = main.read_text(encoding='utf-8')
          text = text.replace(
              'PRIMARY_HOST = "formatx1.formatx.workers.dev"',
              'PRIMARY_HOST = "www.formatxsuite.com"',
          )
          text = text.replace('PRIMARY_PATH = "/scifi-ui/"', 'PRIMARY_PATH = "/"')
          text = text.replace('FormatX Worker megnyitása', 'FormatX weboldal megnyitása')
          text = text.replace(
              'Kapcsolódás az elsődleges FormatX Workerhez.',
              'Kapcsolódás a FormatX fődomainhez.',
          )
          text = re.sub(r'FormatXAndroid/[0-9.]+', 'FormatXAndroid/1.0.6', text)
          text = re.sub(r'appendQueryParameter\("appVersion", "[0-9.]+"\)',
                        'appendQueryParameter("appVersion", "1.0.6")', text)
          text = re.sub(r'appendQueryParameter\("cacheBust", "[0-9]+"\)',
                        'appendQueryParameter("cacheBust", "106")', text)

          zoom_anchor = '        settings.setDisplayZoomControls(false);\n'
          webview_readability = (
              zoom_anchor
              + '        settings.setSupportZoom(false);\n'
              + '        settings.setUseWideViewPort(true);\n'
              + '        settings.setLoadWithOverviewMode(false);\n'
              + '        settings.setTextZoom(100);\n'
              + '        settings.setDefaultFontSize(16);\n'
              + '        settings.setMinimumFontSize(12);\n'
          )
          if 'settings.setUseWideViewPort(true);' not in text:
              text = text.replace(zoom_anchor, webview_readability)
          main.write_text(text, encoding='utf-8')

          updater = Path('android-app/app/src/main/java/hu/formatx/suite/AppUpdater.java')
          text = updater.read_text(encoding='utf-8')
          text = text.replace(
              'https://formatx1.formatx.workers.dev/scifi-ui/downloads/android-update.json',
              'https://www.formatxsuite.com/scifi-ui/downloads/android-update.json',
          )
          updater.write_text(text, encoding='utf-8')

          build = Path('android-app/app/build.gradle.kts')
          text = build.read_text(encoding='utf-8')
          text = re.sub(r'versionCode = \d+', 'versionCode = 8', text)
          text = re.sub(r'versionName = "[0-9.]+"', 'versionName = "1.0.6"', text)
          build.write_text(text, encoding='utf-8')

      - name: Verify Android 1.0.6 source
        shell: bash
        run: |
          set -euo pipefail
          MAIN="android-app/app/src/main/java/hu/formatx/suite/MainActivity.java"
          UPDATER="android-app/app/src/main/java/hu/formatx/suite/AppUpdater.java"
          BUILD="android-app/app/build.gradle.kts"
          grep -F 'PRIMARY_HOST = "www.formatxsuite.com"' "$MAIN"
          grep -F 'PRIMARY_PATH = "/"' "$MAIN"
          grep -F 'FALLBACK_HOST = "hutoczky.github.io"' "$MAIN"
          grep -F 'settings.setUseWideViewPort(true)' "$MAIN"
          grep -F 'settings.setLoadWithOverviewMode(false)' "$MAIN"
          grep -F 'settings.setTextZoom(100)' "$MAIN"
          grep -F 'FormatXAndroid/1.0.6' "$MAIN"
          grep -F 'https://www.formatxsuite.com/scifi-ui/downloads/android-update.json' "$UPDATER"
          grep -F 'versionCode = 8' "$BUILD"
          grep -F 'versionName = "1.0.6"' "$BUILD"

      - name: Build and lint Android 1.0.6
        shell: bash
        run: |
          set -euo pipefail
          gradle --no-daemon --stacktrace --warning-mode all --project-dir android-app \
            :app:assembleDebug :app:lintDebug

      - name: Publish APK and metadata
        shell: bash
        run: |
          set -euo pipefail
          APK="android-app/app/build/outputs/apk/debug/app-debug.apk"
          DEST="docs/scifi-ui/downloads/FormatX-Suite-Pro-Android.apk"
          VERSIONED="docs/scifi-ui/downloads/FormatX-Suite-Pro-Android-1.0.6.apk"
          MANIFEST="docs/scifi-ui/downloads/android-update.json"

          test -s "$APK"
          unzip -t "$APK" >/dev/null
          test "$(stat -c '%s' "$APK")" -gt 800000
          cp "$APK" "$DEST"
          cp "$APK" "$VERSIONED"
          SHA256="$(sha256sum "$DEST" | awk '{print $1}')"
          printf '%s  %s\n' "$SHA256" "$DEST" > docs/scifi-ui/downloads/FormatX-Suite-Pro-Android.apk.sha256

          SHA256="$SHA256" python3 - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          manifest = Path('docs/scifi-ui/downloads/android-update.json')
          data = json.loads(manifest.read_text(encoding='utf-8'))
          data.update({
              'versionCode': 8,
              'versionName': '1.0.6',
              'apkUrl': 'https://www.formatxsuite.com/download/android',
              'sha256': os.environ['SHA256'],
              'mandatory': False,
              'notes': 'Tiszta formatxsuite.com fődomain, Android WebView olvashatósági mód, megszüntetett 3D szövegfedések és frissített alkalmazáskapcsolatok.'
          })
          manifest.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          obsolete = Path('docs/scifi-ui/android-update.json')
          if obsolete.exists():
              obsolete.unlink()

          worker = Path('billing-worker/src/production-entry.js')
          if worker.exists():
              text = worker.read_text(encoding='utf-8')
              text = re.sub(
                  r'FormatX-Suite-Pro-Android-[0-9.]+\.apk',
                  'FormatX-Suite-Pro-Android-1.0.6.apk',
                  text,
              )
              text = re.sub(
                  r"assetUrl\.searchParams\.set\('v', '[0-9.]+'\)",
                  "assetUrl.searchParams.set('v', '1.0.6')",
                  text,
              )
              worker.write_text(text, encoding='utf-8')
          PY

          test "$(python3 -c "import json; print(json.load(open('$MANIFEST'))['sha256'])")" = "$SHA256"
          echo "APK_SHA256=$SHA256" >> "$GITHUB_ENV"

      - name: Commit Android 1.0.6 APK and source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android-app \
            docs/scifi-ui/downloads \
            billing-worker/src/production-entry.js
          git add -A docs/scifi-ui/android-update.json
          git commit -m "Publish FormatX Android 1.0.6 with readable custom-domain WebView"
          git pull --rebase origin master
          git push origin HEAD:master

      - name: Verify generated Android package
        shell: bash
        run: |
          set -euo pipefail
          test -s docs/scifi-ui/downloads/FormatX-Suite-Pro-Android.apk
          test -s docs/scifi-ui/downloads/FormatX-Suite-Pro-Android-1.0.6.apk
          test "${#APK_SHA256}" -eq 64
          echo "Android 1.0.6 APK prepared and published with SHA-256: $APK_SHA256"
