name: Build and publish FormatX Android APK

on:
  pull_request:
    branches: [master]
    paths:
      - "android-app/**"
      - ".github/workflows/build-android-app.yml"
  push:
    branches: [master]
    paths:
      - "android-app/**"
      - ".github/workflows/build-android-app.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: formatx-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build, verify and publish Android app
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 9.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.5.0"

      - name: Install Android SDK components
        shell: bash
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          test -n "$SDK_ROOT"
          SDKMANAGER="$(find "$SDK_ROOT/cmdline-tools" -type f -name sdkmanager | sort -V | tail -n 1)"
          test -x "$SDKMANAGER"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0"

      - name: Apply Android 1.0.4 WebView correction
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          main = Path('android-app/app/src/main/java/hu/formatx/suite/MainActivity.java')
          text = main.read_text(encoding='utf-8')

          text = text.replace('FormatXAndroid/1.0.3', 'FormatXAndroid/1.0.4')
          text = text.replace('appVersion", "1.0.3"', 'appVersion", "1.0.4"')
          text = text.replace('settings.setCacheMode(WebSettings.LOAD_DEFAULT);',
                              'settings.setCacheMode(WebSettings.LOAD_NO_CACHE);')

          old_init = '        configureWebView();\n        configureBackNavigation();'
          new_init = ('        configureWebView();\n'
                      '        webView.clearCache(true);\n'
                      '        webView.clearHistory();\n'
                      '        android.webkit.WebStorage.getInstance().deleteAllData();\n'
                      '        configureBackNavigation();')
          if 'webView.clearCache(true);' not in text:
              if old_init not in text:
                  raise SystemExit('Nem található a WebView inicializálási pont.')
              text = text.replace(old_init, new_init, 1)

          if '.appendQueryParameter("cacheBust", "104")' not in text:
              marker = '.appendQueryParameter("appVersion", "1.0.4")'
              if marker not in text:
                  raise SystemExit('Nem található az Android appVersion paraméter.')
              text = text.replace(
                  marker,
                  marker + '\n                .appendQueryParameter("cacheBust", "104")',
                  1,
              )

          required = [
              'private static final String PRIMARY_HOST = "formatx1.formatx.workers.dev";',
              'private static final String PRIMARY_PATH = "/scifi-ui/";',
              'settings.setCacheMode(WebSettings.LOAD_NO_CACHE);',
              'webView.clearCache(true);',
              'android.webkit.WebStorage.getInstance().deleteAllData();',
              'cacheBust", "104"',
              'FormatXAndroid/1.0.4',
          ]
          for item in required:
              if item not in text:
                  raise SystemExit(f'Hiányzó Android javítás: {item}')
          main.write_text(text, encoding='utf-8')

          gradle = Path('android-app/app/build.gradle.kts')
          build = gradle.read_text(encoding='utf-8')
          if 'versionName = "1.0.3"' in build:
              build = build.replace('versionCode = 5', 'versionCode = 6')
              build = build.replace('versionName = "1.0.3"', 'versionName = "1.0.4"')
          if 'versionCode = 6' not in build or 'versionName = "1.0.4"' not in build:
              raise SystemExit('Az Android 1.0.4 verzióbeállítás hiányzik.')
          gradle.write_text(build, encoding='utf-8')
          PY

      - name: Build debug, release and lint
        id: gradle
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p dist
          gradle --no-daemon --stacktrace --warning-mode all --project-dir android-app \
            :app:assembleDebug :app:assembleRelease :app:lintDebug \
            2>&1 | tee dist/android-build.log
          find android-app/app/build -type f \( -name 'lint-results-debug.txt' -o -name 'lint-results-debug.html' -o -name 'lint-results-debug.sarif' \) -exec cp {} dist/ \; || true

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FormatX-Android-Build-Diagnostics
          path: dist/
          if-no-files-found: error
          retention-days: 7

      - name: Stop on failed build
        if: steps.gradle.outcome == 'failure'
        run: exit 1

      - name: Prepare APK artifacts
        shell: bash
        run: |
          set -euo pipefail
          cp android-app/app/build/outputs/apk/debug/app-debug.apk dist/FormatX-Suite-Pro-Android-debug.apk
          cp android-app/app/build/outputs/apk/release/app-release-unsigned.apk dist/FormatX-Suite-Pro-Android-release-unsigned.apk
          unzip -t dist/FormatX-Suite-Pro-Android-debug.apk >/dev/null
          sha256sum dist/FormatX-Suite-Pro-Android-debug.apk | tee dist/FormatX-Suite-Pro-Android-debug.apk.sha256
          sha256sum dist/FormatX-Suite-Pro-Android-release-unsigned.apk | tee dist/FormatX-Suite-Pro-Android-release-unsigned.apk.sha256

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: FormatX-Suite-Pro-Android-debug
          path: |
            dist/FormatX-Suite-Pro-Android-debug.apk
            dist/FormatX-Suite-Pro-Android-debug.apk.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Upload unsigned release APK
        uses: actions/upload-artifact@v4
        with:
          name: FormatX-Suite-Pro-Android-release-unsigned
          path: |
            dist/FormatX-Suite-Pro-Android-release-unsigned.apk
            dist/FormatX-Suite-Pro-Android-release-unsigned.apk.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Publish APK into website assets
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import re
          import shutil
          from hashlib import sha256
          from pathlib import Path

          gradle = Path('android-app/app/build.gradle.kts').read_text(encoding='utf-8')
          code_match = re.search(r'versionCode\s*=\s*(\d+)', gradle)
          name_match = re.search(r'versionName\s*=\s*"([^"]+)"', gradle)
          if not code_match or not name_match:
              raise SystemExit('Nem olvasható ki az Android verzió.')
          version_code = int(code_match.group(1))
          version_name = name_match.group(1)

          source = Path('android-app/app/build/outputs/apk/debug/app-debug.apk')
          destination = Path('docs/scifi-ui/downloads/FormatX-Suite-Pro-Android.apk')
          versioned = destination.with_name(f'FormatX-Suite-Pro-Android-{version_name}.apk')
          destination.parent.mkdir(parents=True, exist_ok=True)
          shutil.copy2(source, destination)
          shutil.copy2(source, versioned)

          digest = sha256(destination.read_bytes()).hexdigest()
          destination.with_suffix(destination.suffix + '.sha256').write_text(
              f'{digest}  {destination.as_posix()}\n', encoding='utf-8'
          )

          manifest = Path('docs/scifi-ui/downloads/android-update.json')
          data = json.loads(manifest.read_text(encoding='utf-8'))
          data.update({
              'versionCode': version_code,
              'versionName': version_name,
              'apkUrl': 'https://hutoczky.github.io/FormatX/scifi-ui/downloads/FormatX-Suite-Pro-Android.apk',
              'sha256': digest,
              'mandatory': False,
              'notes': 'A helyes formatx1 /scifi-ui oldal, teljes WebView cache-törlés és friss, cache nélküli oldalbetöltés.'
          })
          manifest.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          worker = Path('billing-worker/src/production-entry.js')
          worker_text = worker.read_text(encoding='utf-8')
          worker_text = re.sub(
              r'FormatX-Suite-Pro-Android-[0-9.]+\.apk',
              f'FormatX-Suite-Pro-Android-{version_name}.apk',
              worker_text,
          )
          worker.write_text(worker_text, encoding='utf-8')

          Path('dist/published-version.txt').write_text(
              f'{version_name}\n{version_code}\n{digest}\n', encoding='utf-8'
          )
          PY

      - name: Deploy modern site and API to formatx1 Worker
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ffd7d28ea7c6a510549dc9363619c8c5
          workingDirectory: billing-worker
          command: deploy --name formatx1

      - name: Verify formatx1 modern page and CSS
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        shell: bash
        run: |
          set -euo pipefail
          HTML="$(mktemp)"
          CSS="$(mktemp)"
          URL='https://formatx1.formatx.workers.dev/scifi-ui/?lang=hu&cacheBust=104'
          for attempt in $(seq 1 12); do
            if curl -fsSL --connect-timeout 10 --max-time 30 -H 'Cache-Control: no-cache' "$URL" -o "$HTML" \
                && grep -Fq 'class="reference-commerce"' "$HTML" \
                && grep -Fq 'reference-commerce.css' "$HTML"; then
              break
            fi
            if [ "$attempt" -eq 12 ]; then
              echo 'A formatx1 Worker nem a modern FormatX oldalt szolgálja ki.' >&2
              sed -n '1,80p' "$HTML" >&2 || true
              exit 1
            fi
            sleep 5
          done
          curl -fsSL --connect-timeout 10 --max-time 30 -H 'Cache-Control: no-cache' \
            'https://formatx1.formatx.workers.dev/scifi-ui/styles/reference-commerce.css?v=20260718-reference-commerce-1' -o "$CSS"
          test "$(stat -c '%s' "$CSS")" -gt 1000
          grep -Fq '.reference-commerce' "$CSS"

      - name: Commit published Android source and APK
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(sed -n '1p' dist/published-version.txt)"
          git config user.name "github-actions[bot]"
          git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
          git add android-app/app/src/main/java/hu/formatx/suite/MainActivity.java \
                  android-app/app/build.gradle.kts \
                  docs/scifi-ui/downloads \
                  billing-worker/src/production-entry.js
          if git diff --cached --quiet; then
            echo 'Nincs publikálandó Android-változás.'
            exit 0
          fi
          git commit -m "Publish FormatX Android ${VERSION} with WebView cache fix"
          git pull --rebase origin master
          git push origin HEAD:master
