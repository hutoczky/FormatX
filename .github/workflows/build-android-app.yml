name: Build FormatX Android APK

on:
  pull_request:
    branches: [master]
    paths:
      - "android-app/**"
      - ".github/workflows/build-android-app.yml"
  push:
    branches: [master]
    paths:
      - "android-app/**"
      - ".github/workflows/build-android-app.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and lint Android app
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 9.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.5.0"

      - name: Install Android SDK components
        shell: bash
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          test -n "$SDK_ROOT"
          SDKMANAGER="$(find "$SDK_ROOT/cmdline-tools" -type f -name sdkmanager | sort -V | tail -n 1)"
          test -x "$SDKMANAGER"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0"

      - name: Build and lint
        run: gradle --no-daemon --stacktrace --project-dir android-app :app:assembleDebug :app:lintDebug

      - name: Prepare named APK
        run: |
          mkdir -p dist
          cp android-app/app/build/outputs/apk/debug/app-debug.apk dist/FormatX-Suite-Pro-Android.apk
          sha256sum dist/FormatX-Suite-Pro-Android.apk | tee dist/FormatX-Suite-Pro-Android.apk.sha256

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FormatX-Suite-Pro-Android
          path: |
            dist/FormatX-Suite-Pro-Android.apk
            dist/FormatX-Suite-Pro-Android.apk.sha256
          if-no-files-found: error
          retention-days: 30
