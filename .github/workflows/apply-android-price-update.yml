name: Apply unified Android and website prices

on:
  push:
    branches:
      - agent/android-app-simple-payment
    paths:
      - ".github/workflows/apply-android-price-update.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/android-app-simple-payment

      - name: Apply fixed discounted prices everywhere
        run: |
          python3 - <<'PY'
          from pathlib import Path

          replacements = {
              "HUF: { monthly: 19900, annual: 199000 }": "HUF: { monthly: 15900, annual: 139300 }",
              "EUR: { monthly: 55, annual: 547 }": "EUR: { monthly: 44, annual: 383 }",
              "HUF: { monthly: 49900, annual: 499000 }": "HUF: { monthly: 39900, annual: 349300 }",
              "EUR: { monthly: 137, annual: 1373 }": "EUR: { monthly: 110, annual: 961 }",
              "HUF: { monthly: 99900, annual: 999000 }": "HUF: { monthly: 79900, annual: 699300 }",
              "EUR: { monthly: 275, annual: 2748 }": "EUR: { monthly: 220, annual: 1924 }",
              "monthly: 19900,\n      annual: 199000": "monthly: 15900,\n      annual: 139300",
              "monthly: 49900,\n      annual: 499000": "monthly: 39900,\n      annual: 349300",
              "monthly: 99900,\n      annual: 999000": "monthly: 79900,\n      annual: 699300",
              "formatPrice(137, 'EUR')": "formatPrice(110, 'EUR')",
              "formatPrice(49900, 'HUF')": "formatPrice(39900, 'HUF')",
              "55 €": "44 €",
              "19 900 Ft / hó": "15 900 Ft / hó",
              "137 €": "110 €",
              "49 900 Ft / hó": "39 900 Ft / hó",
              "275 €": "220 €",
              "99 900 Ft / hó": "79 900 Ft / hó",
              ">49 900 Ft<": ">39 900 Ft<",
          }

          files = [
              Path('docs/scifi-ui/scripts/checkout.js'),
              Path('docs/scifi-ui/scripts/checkout-language.js'),
              Path('docs/scifi-ui/scripts/billing.js'),
              Path('docs/scifi-ui/scripts/landing.js'),
              Path('docs/scifi-ui/scripts/site.js'),
              Path('docs/scifi-ui/index.html'),
              Path('billing-worker/src/live-entry.js'),
              Path('billing-worker/src/index.js'),
              Path('billing-worker/README.md'),
              Path('.github/workflows/validate-checkout.yml'),
          ]

          changed = []
          for path in files:
              if not path.exists():
                  continue
              original = path.read_text(encoding='utf-8')
              updated = original
              for old, new in replacements.items():
                  updated = updated.replace(old, new)
              if updated != original:
                  path.write_text(updated, encoding='utf-8')
                  changed.append(str(path))

          required = {
              'docs/scifi-ui/scripts/checkout.js': ['15900', '39900', '79900', '139300', '349300', '699300', '44', '110', '220', '383', '961', '1924'],
              'billing-worker/src/live-entry.js': ['15900', '39900', '79900', '139300', '349300', '699300', '44', '110', '220', '383', '961', '1924'],
              'docs/scifi-ui/index.html': ['15 900 Ft / hó', '39 900 Ft / hó', '79 900 Ft / hó', '44 €', '110 €', '220 €'],
          }
          for filename, tokens in required.items():
              text = Path(filename).read_text(encoding='utf-8')
              missing = [token for token in tokens if token not in text]
              if missing:
                  raise SystemExit(f'{filename}: missing updated price tokens {missing}')

          forbidden = ['monthly: 19900', 'monthly: 49900', 'monthly: 99900']
          for filename in ['docs/scifi-ui/scripts/checkout.js', 'billing-worker/src/live-entry.js']:
              text = Path(filename).read_text(encoding='utf-8')
              bad = [token for token in forbidden if token in text]
              if bad:
                  raise SystemExit(f'{filename}: old monthly prices remain: {bad}')

          print('Updated:', ', '.join(changed))
          PY

      - name: Validate JavaScript syntax
        run: |
          node --check docs/scifi-ui/scripts/checkout.js
          node --check docs/scifi-ui/scripts/checkout-language.js
          node --check docs/scifi-ui/scripts/billing.js
          node --check docs/scifi-ui/scripts/landing.js
          node --check billing-worker/src/live-entry.js

      - name: Commit price alignment
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/scifi-ui billing-worker .github/workflows/validate-checkout.yml
          if git diff --cached --quiet; then
            echo "No price changes needed."
          else
            git commit -m "Align website and Android discounted prices"
            git push origin HEAD:agent/android-app-simple-payment
          fi
