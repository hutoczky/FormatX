name: Serve apex domain directly

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/serve-apex-without-www-redirect.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-worker:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Remove apex-to-www redirect dependency
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('billing-worker/src/production-entry.js')
          text = path.read_text(encoding='utf-8')
          old = """    if (url.hostname === APEX_HOST) {
      const target = new URL(request.url);
      target.hostname = CANONICAL_HOST;
      target.protocol = 'https:';
      response = Response.redirect(target.toString(), 308);
    } else if (url.pathname === '/api/project-ai') {
"""
          new = """    if (url.pathname === '/api/project-ai') {
"""
          if old not in text:
              raise SystemExit('Expected apex redirect block not found')
          text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit direct apex serving
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
          git add billing-worker/src/production-entry.js
          git commit -m "Serve formatxsuite.com directly without www redirect"
          git pull --rebase origin master
          git push origin HEAD:master
