name: Diagnose FormatX Cloudflare access

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/diagnose-formatx-cloudflare.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Diagnose Cloudflare token and zone
        shell: bash
        env:
          RAW_CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ffd7d28ea7c6a510549dc9363619c8c5
        run: |
          set +e
          mkdir -p docs/diagnostics
          REPORT="docs/diagnostics/formatx-cloudflare-auth.txt"
          : > "$REPORT"
          echo "FormatX Cloudflare authentication diagnostics" >> "$REPORT"
          echo "Generated UTC: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$REPORT"
          echo >> "$REPORT"

          RAW="$(printf '%s' "$RAW_CF_TOKEN" | tr -d '\r\n')"
          TOKEN="$RAW"
          TOKEN="${TOKEN#Authorization:}"
          TOKEN="${TOKEN#authorization:}"
          TOKEN="$(printf '%s' "$TOKEN" | sed -E 's/^[[:space:]]*[Bb][Ee][Aa][Rr][Ee][Rr][[:space:]]+//; s/^[[:space:]]+//; s/[[:space:]]+$//; s/^\"//; s/\"$//; s/^\x27//; s/\x27$//')"
          echo "raw_present=$([ -n "$RAW" ] && echo true || echo false)" >> "$REPORT"
          echo "raw_length=${#RAW}" >> "$REPORT"
          echo "normalized_length=${#TOKEN}" >> "$REPORT"
          echo "had_bearer_prefix=$([ "$RAW" != "$TOKEN" ] && echo true || echo false)" >> "$REPORT"
          echo >> "$REPORT"

          if [ -z "$TOKEN" ]; then
            echo "RESULT=FAIL" >> "$REPORT"
            echo "reason=CLOUDFLARE_API_TOKEN secret is empty" >> "$REPORT"
            exit 0
          fi

          echo "::add-mask::$TOKEN"
          API="https://api.cloudflare.com/client/v4"
          AUTH=(-H "Authorization: Bearer ${TOKEN}" -H "Content-Type: application/json")

          VERIFY_FILE="$(mktemp)"
          VERIFY_CODE="$(curl -sS -o "$VERIFY_FILE" -w '%{http_code}' "${AUTH[@]}" "$API/user/tokens/verify")"
          echo "token_verify_http=$VERIFY_CODE" >> "$REPORT"
          echo "token_verify_success=$(jq -r '.success // false' "$VERIFY_FILE" 2>/dev/null)" >> "$REPORT"
          echo "token_status=$(jq -r '.result.status // "unknown"' "$VERIFY_FILE" 2>/dev/null)" >> "$REPORT"
          echo "token_error_code=$(jq -r '.errors[0].code // "none"' "$VERIFY_FILE" 2>/dev/null)" >> "$REPORT"
          echo "token_error_message=$(jq -r '.errors[0].message // "none"' "$VERIFY_FILE" 2>/dev/null)" >> "$REPORT"
          echo >> "$REPORT"

          ZONE_FILE="$(mktemp)"
          ZONE_CODE="$(curl -sS -o "$ZONE_FILE" -w '%{http_code}' "${AUTH[@]}" "$API/zones?name=formatxsuite.com")"
          echo "zone_query_http=$ZONE_CODE" >> "$REPORT"
          echo "zone_query_success=$(jq -r '.success // false' "$ZONE_FILE" 2>/dev/null)" >> "$REPORT"
          echo "zone_count=$(jq -r '.result | length' "$ZONE_FILE" 2>/dev/null)" >> "$REPORT"
          echo "zone_status=$(jq -r '.result[0].status // "missing"' "$ZONE_FILE" 2>/dev/null)" >> "$REPORT"
          echo "zone_error_code=$(jq -r '.errors[0].code // "none"' "$ZONE_FILE" 2>/dev/null)" >> "$REPORT"
          echo "zone_error_message=$(jq -r '.errors[0].message // "none"' "$ZONE_FILE" 2>/dev/null)" >> "$REPORT"
          echo >> "$REPORT"

          SCRIPTS_FILE="$(mktemp)"
          SCRIPTS_CODE="$(curl -sS -o "$SCRIPTS_FILE" -w '%{http_code}' "${AUTH[@]}" "$API/accounts/$CF_ACCOUNT_ID/workers/scripts")"
          echo "workers_query_http=$SCRIPTS_CODE" >> "$REPORT"
          echo "workers_query_success=$(jq -r '.success // false' "$SCRIPTS_FILE" 2>/dev/null)" >> "$REPORT"
          echo "formatx_worker_found=$(jq -r '[.result[]?.id] | index("formatx") != null' "$SCRIPTS_FILE" 2>/dev/null)" >> "$REPORT"
          echo "workers_error_code=$(jq -r '.errors[0].code // "none"' "$SCRIPTS_FILE" 2>/dev/null)" >> "$REPORT"
          echo "workers_error_message=$(jq -r '.errors[0].message // "none"' "$SCRIPTS_FILE" 2>/dev/null)" >> "$REPORT"

          if jq -e '.success == true and .result.status == "active"' "$VERIFY_FILE" >/dev/null 2>&1 \
             && jq -e '.success == true and (.result | length) == 1' "$ZONE_FILE" >/dev/null 2>&1; then
            echo >> "$REPORT"
            echo "RESULT=PASS" >> "$REPORT"
          else
            echo >> "$REPORT"
            echo "RESULT=FAIL" >> "$REPORT"
          fi

      - name: Commit diagnostic report
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/diagnostics/formatx-cloudflare-auth.txt
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Publish Cloudflare authentication diagnostics"
          git pull --rebase origin master
          git push origin HEAD:master
