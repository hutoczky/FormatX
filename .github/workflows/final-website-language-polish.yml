name: Final FormatX website language polish

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/final-website-language-polish.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  polish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Apply final language corrections
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          changed = []

          def patch(filename, pairs):
              path = Path(filename)
              text = path.read_text(encoding='utf-8')
              original = text
              for old, new in pairs:
                  text = text.replace(old, new)
              if text != original:
                  path.write_text(text, encoding='utf-8')
                  changed.append(filename)

          patch('docs/scifi-ui/index.html', [
              ('Linux/Bazzite fejlesztés alatt · macOS tervezett', 'Linux/Bazzite: fejlesztés alatt · macOS: tervezett'),
              ('<span>Linux / Bazzite elsődleges célplatform</span>', '<span>Linux/Bazzite: elsődleges célplatform</span>'),
              ('<span>Webes és Android hozzáférés</span>', '<span>Webes és Android-hozzáférés</span>'),
              ('<span>HU / EN kezelőfelület</span>', '<span>Magyar és angol kezelőfelület</span>'),
              ('A cél egy teljes karbantartási és rendszer-előkészítési munkakörnyezet létrehozása, nem csupán egy formázóprogramé.', 'A cél egy teljes karbantartási és rendszer-előkészítési munkakörnyezet létrehozása, nem csupán egy formázóprogram elkészítése.'),
              ('Csomag választása', 'Csomag kiválasztása'),
              ('Normál támogatás', 'Alapszintű támogatás'),
              ('5 napos próbaidő', '5 napos próba'),
              ('BIZTONSÁGOS CHECKOUT ELŐNÉZET', 'BIZTONSÁGOS FIZETÉSI FOLYAMAT'),
              ('Business Pro licenc', 'Business Pro-licenc'),
              ('Checkout megnyitása', 'Fizetés megnyitása'),
              ('Fix, előre rögzített összeg', 'Előre rögzített összeg'),
              ('Fix összeg · HUF / EUR · Kézi ellenőrzés', 'Rögzített összeg · HUF vagy EUR · Kézi ellenőrzés'),
              ('SHA256 és Ed25519 ellenőrzés', 'SHA-256- és Ed25519-ellenőrzés'),
              ('GitHub Release és hash-ellenőrzés', 'GitHub-kiadások és ellenőrzőösszegek'),
              ('A legújabb stabil kiadás és a projektállapot', 'A legújabb elérhető kiadás és a projekt állapota'),
          ])

          patch('docs/scifi-ui/scripts/landing.js', [
              ("choosePlan: 'Csomag választása'", "choosePlan: 'Csomag kiválasztása'"),
              ("lite4: 'Normál támogatás'", "lite4: 'Alapszintű támogatás'"),
              ("trialNote: '5 napos próbaidő'", "trialNote: '5 napos próba'"),
              ("checkoutPreview: 'BIZTONSÁGOS CHECKOUT ELŐNÉZET'", "checkoutPreview: 'BIZTONSÁGOS FIZETÉSI FOLYAMAT'"),
              ("selectedPlan: 'Business Pro licenc'", "selectedPlan: 'Business Pro-licenc'"),
              ("fixedAmount: 'Fix, előre rögzített összeg'", "fixedAmount: 'Előre rögzített összeg'"),
              ("openCheckout: 'Checkout megnyitása'", "openCheckout: 'Fizetés megnyitása'"),
              ("instantSecure: 'Fix összeg · HUF / EUR · Kézi ellenőrzés'", "instantSecure: 'Rögzített összeg · HUF vagy EUR · Kézi ellenőrzés'"),
              ("feature4Title: 'Többrétegű biztonság'", "feature4Title: 'Többrétegű védelem'"),
              ("feature4Copy: 'Megerősítés, naplózás, SHA256 és Ed25519 ellenőrzés.'", "feature4Copy: 'Megerősítés, naplózás, valamint SHA-256- és Ed25519-ellenőrzés.'"),
              ("trust1Copy: 'GitHub Release és hash-ellenőrzés'", "trust1Copy: 'GitHub-kiadások és ellenőrzőösszegek'"),
              ("updatesCopy: 'A legújabb stabil kiadás és a projektállapot a GitHub kiadási csatornáján követhető.'", "updatesCopy: 'A legújabb elérhető kiadás és a projekt állapota a GitHub kiadási csatornáján követhető.'"),
              ("choosePlan: 'Choose Plan'", "choosePlan: 'Choose plan'"),
              ("checkoutPreview: 'SECURE CHECKOUT PREVIEW'", "checkoutPreview: 'SECURE PAYMENT PROCESS'"),
              ("openCheckout: 'Open Checkout'", "openCheckout: 'Open payment page'"),
              ("feature4Title: 'Multi-Layer Security'", "feature4Title: 'Multi-layer protection'"),
              ("feature4Copy: 'Confirmation, audit logs, SHA256 and Ed25519 verification.'", "feature4Copy: 'Confirmation, audit logs, SHA-256 checks and Ed25519 verification.'"),
              ("feature6Copy: 'The Windows desktop prototype is currently available. Linux / Bazzite is the next primary development target, while macOS is planned for a later phase.'", "feature6Copy: 'The Windows desktop prototype is currently available. Linux/Bazzite is the next primary development target, while macOS is planned for a later phase.'"),
              ("updatesCopy: 'Follow the latest stable release and project status through the GitHub release channel.'", "updatesCopy: 'Follow the latest available release and the current project status through the GitHub release channel.'"),
          ])

          patch('docs/project.html', [
              ('Windowsos asztali prototípus érhető el.', 'Jelenleg Windowsos asztali prototípus érhető el.'),
              ('Android-hozzáférés', 'Android-alkalmazás'),
          ])

          patch('docs/scifi-ui/checkout.html', [
              ('href="./index.html#pro">Mégsem', 'href="./index.html#pricing">Mégsem'),
              ('Fix összegű banki átutalási adatok QR-kódja', 'Rögzített összegű banki átutalás QR-kódja'),
              ('A QR-kód a kiválasztott fix összeget', 'A QR-kód a kiválasztott, rögzített összeget'),
              ('<h2>Átutalás visszajelzése</h2>', '<h2>Az átutalás bejelentése</h2>'),
              ('<button id="confirmation-submit" class="button primary" type="submit">Átutalás visszajelzése</button>', '<button id="confirmation-submit" class="button primary" type="submit">Átutalás bejelentése</button>'),
          ])

          workflow = Path('.github/workflows/final-website-language-polish.yml')
          if workflow.exists():
              workflow.unlink()

          if not changed:
              raise SystemExit('No website text was changed.')
          print('\n'.join(changed))
          PY

      - name: Commit final text corrections
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize clear and natural website wording"
          git pull --rebase origin master
          git push origin HEAD:master
