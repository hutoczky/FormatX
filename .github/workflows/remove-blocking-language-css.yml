name: Remove blocking language CSS

on:
  push:
    branches:
      - agent/fix-visible-language-switch
    paths:
      - "tools/remove-blocking-language-css.py"
      - ".github/workflows/remove-blocking-language-css.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-visible-language-switch
          fetch-depth: 0

      - name: Remove blocking language CSS
        run: python3 tools/remove-blocking-language-css.py

      - name: Commit non-blocking loader
        run: |
          if git diff --quiet; then
            echo "Language CSS is already non-blocking."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/scifi-ui/*.html
          git commit -m "Load language styles without blocking render"
          git push origin HEAD:agent/fix-visible-language-switch
