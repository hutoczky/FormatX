name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - name: Prefer a non-premium default model
        run: |
          echo "COPILOT_AGENT_MODEL=gpt-5-mini" >> "$GITHUB_ENV"
