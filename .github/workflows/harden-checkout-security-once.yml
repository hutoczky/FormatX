name: Apply and remove FormatX checkout security hardening

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/harden-checkout-security-once.yml"

permissions:
  contents: write

concurrency:
  group: formatx-checkout-security-once
  cancel-in-progress: true

jobs:
  harden:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository and reviewed hardening source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 50

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: billing-worker/package-lock.json

      - name: Recover and run the reviewed hardening script
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_COMMIT="c5330835cb209bc476af265759b6448f885f48a7"
          git cat-file -e "$SOURCE_COMMIT^{commit}"
          git show "$SOURCE_COMMIT:.github/workflows/harden-checkout-security-once.yml" > /tmp/formatx-hardening-source.yml
          python3 - <<'PY'
          from pathlib import Path
          import textwrap

          source = Path('/tmp/formatx-hardening-source.yml').read_text(encoding='utf-8')
          start_marker = "          python3 - <<'PY'\n"
          end_marker = "\n          PY\n"
          start = source.index(start_marker) + len(start_marker)
          end = source.index(end_marker, start)
          script = textwrap.dedent(source[start:end])
          Path('/tmp/formatx-hardening.py').write_text(script, encoding='utf-8')
          PY
          python3 /tmp/formatx-hardening.py

      - name: Validate JavaScript syntax
        run: |
          set -euo pipefail
          node --check billing-worker/src/live-entry.js
          node --check billing-worker/src/production-entry.js
          node --check docs/scifi-ui/scripts/checkout.js
          node --check docs/scifi-ui/scripts/payment-status.js

      - name: Install Worker dependencies
        working-directory: billing-worker
        run: npm ci

      - name: Validate complete Worker bundle
        working-directory: billing-worker
        run: npx wrangler deploy --dry-run --outdir ../.wrangler-security-dry-run

      - name: Commit validated hardening
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Harden checkout order access and fail closed"
          git push
