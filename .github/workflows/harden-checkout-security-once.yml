name: Apply and remove FormatX checkout security hardening

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/harden-checkout-security-once.yml"

permissions:
  contents: write

concurrency:
  group: formatx-checkout-security-once
  cancel-in-progress: true

jobs:
  harden:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository and reviewed hardening source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 50

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: billing-worker/package-lock.json

      - name: Recover and run the reviewed checkout hardening
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_COMMIT="c5330835cb209bc476af265759b6448f885f48a7"
          git cat-file -e "$SOURCE_COMMIT^{commit}"
          git show "$SOURCE_COMMIT:.github/workflows/harden-checkout-security-once.yml" > /tmp/formatx-hardening-source.yml
          python3 - <<'PY'
          from pathlib import Path
          import textwrap

          source = Path('/tmp/formatx-hardening-source.yml').read_text(encoding='utf-8')
          start_marker = "          python3 - <<'PY'\n"
          end_marker = "\n          PY\n"
          start = source.index(start_marker) + len(start_marker)
          end = source.index(end_marker, start)
          script = textwrap.dedent(source[start:end])
          Path('/tmp/formatx-hardening.py').write_text(script, encoding='utf-8')
          PY
          python3 /tmp/formatx-hardening.py

      - name: Consolidate Android on the two custom domains
        shell: python
        run: |
          import re
          from pathlib import Path

          main_path = Path('android-app/app/src/main/java/hu/formatx/suite/MainActivity.java')
          main = main_path.read_text(encoding='utf-8')
          main = re.sub(r'PRIMARY_HOST = "[^"]+"', 'PRIMARY_HOST = "www.formatxsuite.com"', main)
          main = re.sub(r'PRIMARY_PATH = "[^"]+"', 'PRIMARY_PATH = "/"', main)
          main = re.sub(r'FALLBACK_HOST = "[^"]+"', 'FALLBACK_HOST = "formatxsuite.com"', main)
          main = re.sub(r'FALLBACK_PATH = "[^"]+"', 'FALLBACK_PATH = "/"', main)
          main = main.replace('GitHub tartalék oldal megnyitása', 'FormatX tartalék domain megnyitása')
          main = main.replace(
              'Az elsődleges Worker nem adott megfelelő oldalt. A GitHub tartalék betöltése folyamatban van.',
              'Az elsődleges domain nem adott megfelelő oldalt. A FormatX tartalék domain betöltése folyamatban van.',
          )
          main = main.replace('A FormatX oldalak nem érhetők el.', 'A FormatX nem érhető el.')
          main = main.replace('nyisd meg valamelyik oldalt külön.', 'nyisd meg a weboldalt külön.')
          if 'hutoczky.github.io' in main:
              raise SystemExit('GitHub Pages fallback remained in MainActivity.java')
          main_path.write_text(main, encoding='utf-8')

          payment_activity = Path('android-app/app/src/main/java/hu/formatx/suite/PaymentActivity.java').read_text(encoding='utf-8')
          payment_data = Path('android-app/app/src/main/java/hu/formatx/suite/PaymentData.java').read_text(encoding='utf-8')
          if 'https://www.formatxsuite.com/support.html' not in payment_activity:
              raise SystemExit('Android support URL is not on the production domain')
          if 'ORDER_REFERENCE_PATTERN' not in payment_data:
              raise SystemExit('Android does not accept secure server-generated order references')

      - name: Validate JavaScript and configuration invariants
        run: |
          set -euo pipefail
          node --check billing-worker/src/live-entry.js
          node --check billing-worker/src/production-entry.js
          node --check docs/scifi-ui/scripts/checkout.js
          node --check docs/scifi-ui/scripts/payment-status.js
          grep -F 'FALLBACK_HOST = "formatxsuite.com"' android-app/app/src/main/java/hu/formatx/suite/MainActivity.java
          ! grep -R -Fq 'hutoczky.github.io' android-app/app/src/main

      - name: Install Worker dependencies
        working-directory: billing-worker
        run: npm ci

      - name: Validate complete Worker bundle
        working-directory: billing-worker
        run: npx wrangler deploy --dry-run --outdir ../.wrangler-security-dry-run

      - name: Commit validated hardening
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Harden checkout order access and consolidate production domains"
          git push
