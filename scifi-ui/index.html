<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,follow">
  <title>FormatX Suite Pro</title>
  <script>
    (function () {
      var source = new URL(window.location.href);
      var language = source.searchParams.get('lang');
      if (language !== 'hu' && language !== 'en') {
        try { language = localStorage.getItem('formatx-language'); } catch (_) {}
      }
      if (language !== 'hu' && language !== 'en') {
        language = String(navigator.language || '').toLowerCase().indexOf('hu') === 0 ? 'hu' : 'en';
      }
      var target = new URL('../docs/scifi-ui/', window.location.href);
      target.searchParams.set('lang', language);
      if (source.hash) target.hash = source.hash;
      window.location.replace(target.href);
    }());
  </script>
</head>
<body>
  <p>Átirányítás az aktuális FormatX Suite Pro oldalra. Redirecting to the current FormatX Suite Pro site.</p>
  <p><a href="../docs/scifi-ui/?lang=hu">Magyar oldal</a> · <a href="../docs/scifi-ui/?lang=en">English site</a></p>
</body>
</html>
